  compradosProEstoque() {
    const feitos = S.lista.filter(l => l.comprado);
    if (!feitos.length) return;
    UI.folha('Mover para o estoque', `
      <div class="dica" style="margin-bottom:12px">${feitos.length} ite${feitos.length === 1 ? 'm' : 'ns'} comprado${feitos.length === 1 ? '' : 's'}
        ser${feitos.length === 1 ? 'ГЎ' : 'ГЈo'} adicionado${feitos.length === 1 ? '' : 's'} ao estoque.
        Itens que vocГӘ jГЎ tem serГЈo <b>somados</b> automaticamente.</div>
      <div class="campo"><label>Guardar em</label>
        <select id="mv-local"><option value="despensa">Despensa</option>
          <option value="geladeira">Geladeira</option><option value="freezer">Freezer</option></select></div>
      <button class="btn btn-primario" style="width:100%;justify-content:center"
        onclick="UI.confirmarComprados()">Mover ${feitos.length} ite${feitos.length === 1 ? 'm' : 'ns'} вң“</button>`);

  confirmarComprados() {
    const loc = document.getElementById('mv-local').value;
    const feitos = S.lista.filter(l => l.comprado);
    let somados = 0, criados = 0;
    for (const l of feitos) {
      const r = adicionarOuSomarEstoque({ nome: l.nome, local: loc,
        qtd: l.qtd || 1, unidade: l.unidade || 'un', validade: null });
      r.somou ? somados++ : criados++;
      S.lista = S.lista.filter(x => x.id !== l.id); DB.remover('lista', l.id);
    }
    UI.fecharOverlay();
    UI.toast(somados ? `Estoque: ${criados} novo${criados === 1 ? '' : 's'}, ${somados} somado${somados === 1 ? '' : 's'} вң“`
                     : `${criados} ite${criados === 1 ? 'm' : 'ns'} no estoque вң“`);
    UI.render();
  },

  /* ---------- ESTATГҚSTICAS ---------- */
  vEstatisticas() {
    const sug = SuggestionProvider.sugerir({ receitas: S.receitas });
    const prontas = sug.filter(s => s.faltam.length === 0).length;
    const falta1 = sug.filter(s => s.faltam.length === 1).length;
    const falta2 = sug.filter(s => s.faltam.length === 2).length;
    const favoritas = S.receitas.filter(r => r.favorito).length;
    const minhas = S.receitas.filter(r => r.origem !== 'seed').length;
    const porLocal = { geladeira: 0, freezer: 0, despensa: 0 };
    let vencidos = 0, vencendo = 0;
    for (const e of S.estoque) {
      if (porLocal[e.local] !== undefined) porLocal[e.local]++;
      const d = U.diasAte(e.validade);
      if (d !== null) { if (d < 0) vencidos++; else if (d <= (S.config.diasAlertaValidade || 3)) vencendo++; }
    }
    const pendentes = S.lista.filter(l => !l.comprado).length;
    const cozinhadas = S.receitas.reduce((a, r) => a + (r.vezesCozinhada || 0), 0);
    const top = S.receitas.filter(r => r.vezesCozinhada > 0)
      .sort((a, b) => b.vezesCozinhada - a.vezesCozinhada).slice(0, 5);

  parseIngrediente(linha) {
    // "2 xГӯc arroz *" | "0,5 un cebola (opcional)" | "3 col sopa azeite" | "sal a gosto"
    linha = linha.trim();
    if (!linha) return null;
    const opcional = /\(opcional\)/i.test(linha);
    const critico = /\*\s*$/.test(linha.replace(/\(opcional\)/i, ''));
    linha = linha.replace(/\(opcional\)/i, '').replace(/\*\s*$/, '').trim();
    if (/\ba gosto\s*$/i.test(linha)) {
      const nome = linha.replace(/\ba gosto\s*$/i, '').trim();
      if (nome) return { nome, qtd: 1, unidade: 'a gosto', opcional: true, critico };
    }
    const m = linha.match(/^([\d.,]+)\s+(.+)$/);
    if (m) {
      const qtd = parseFloat(m[1].replace(',', '.'));
      let resto = m[2].trim(), unidade = null;
      // unidades de duas+ palavras tГӘm prioridade sobre o corte na 1ВӘ palavra
      const compostas = ['colher de sopa', 'colher de chГЎ', 'col sopa', 'col chГЎ'];
      for (const u of compostas) {
        if (U.norm(resto).startsWith(U.norm(u) + ' ')) {
          unidade = resto.slice(0, u.length);
          resto = resto.slice(u.length).trim();
          break;
        }
      }
      if (!unidade) {
        const sp = resto.indexOf(' ');
        if (sp > 0) { unidade = resto.slice(0, sp); resto = resto.slice(sp + 1).trim(); }
      }
      if (unidade && resto) return { nome: resto, qtd, unidade, opcional, critico };
    }
    return { nome: linha, qtd: 1, unidade: 'a gosto', opcional: true, critico: false };
  },

    const nome = document.getElementById('fr-nome').value.trim();
    if (!nome) { UI.toast('DГӘ um nome Г  receita'); return; }
    const ingredientes = document.getElementById('fr-ing').value.split('\n')
      .map(UI.parseIngrediente).filter(Boolean);
    const passos = document.getElementById('fr-passos').value.split('\n')
      .map(s => s.trim()).filter(Boolean);
    if (!ingredientes.length || !passos.length) { UI.toast('Preencha ingredientes e passos'); return; }
    let nutri = null;
    const k = document.getElementById('fr-kcal');
    if (k && k.value) nutri = {
      kcal: +k.value || 0, prot: +document.getElementById('fr-prot').value || 0,
      carb: +document.getElementById('fr-carb').value || 0, gord: +document.getElementById('fr-gord').value || 0 };
    const ant = id ? S.receitas.find(x => x.id === id) : null;
    const r = { id: id || U.id(), nome,
      categoria: document.getElementById('fr-cat').value,
      tempoMin: +document.getElementById('fr-tempo').value || 30,
      porcoesBase: +document.getElementById('fr-porc').value || 4,
      ingredientes, passos,
      tags: document.getElementById('fr-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      equipamentos: ant ? ant.equipamentos : [],
      nutri: nutri || (ant ? ant.nutri : null),
      favorito: ant ? ant.favorito : false, origem: 'manual' };
    if (ant) Object.assign(ant, r); else S.receitas.push(r);
    DB.salvar('receitas', ant || r); // ant preserva campos fora do form (ex.: vezesCozinhada)
    UI.fecharOverlay(); UI.toast('Receita salva вң“'); UI.render();

  /* ---------- TIMER DE PASSO ---------- */
  detectarTempo(txt) {
    let m = txt.match(/(\d+)\s*(?:a|вҖ“|-)\s*(\d+)\s*min/i);      // "4-5 min" вҶ’ usa o maior
    if (m) return Math.max(+m[1], +m[2]) * 60;
    m = txt.match(/(\d+)\s*(?:min|minutos?)\b/i);
    if (m) return +m[1] * 60;
    m = txt.match(/(\d+)\s*(?:h|horas?)\b/i);
    if (m) return +m[1] * 3600;
    return null;
  },
  fmtTempo(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    return h ? `${h}:${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}`
             : `${m}:${String(ss).padStart(2, '0')}`;
  },
  iniciarTimer(seg, rotulo) {
    clearInterval(UI._timerInt);
    UI._timerFim = Date.now() + seg * 1000;
    UI._timerRot = rotulo;
    UI._timerInt = setInterval(UI._tickTimer, 500);
    UI._tickTimer();
  },
  _tickTimer() {
    const el = document.getElementById('coz-timer');
    const resta = Math.ceil((UI._timerFim - Date.now()) / 1000);
    if (resta <= 0) {
      clearInterval(UI._timerInt); UI._timerInt = null;
      if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 300]);
      UI.toast('вҸ° ' + (UI._timerRot || 'Tempo!'));
      if (el) { el.textContent = 'вҸ° Tempo!'; el.classList.add('fim'); }
      return;
    }
    if (el) el.textContent = 'вҸұ ' + UI.fmtTempo(resta);
  },
  cancelarTimer() {
    clearInterval(UI._timerInt); UI._timerInt = null;
    const el = document.getElementById('coz-timer');
    if (el) el.remove();

  copiarPromptImportacao() {

  confirmarImportacaoReceitas() {

    UI.fecharOverlay();
    UI.toast(`\u{1F4D6} ${res.ok} importada${res.ok === 1 ? '' : 's'}` +
      (res.puladas ? ` В· ${res.puladas} jГЎ existia${res.puladas === 1 ? '' : 'm'}` : '') +
      (res.invalidas ? ` В· ${res.invalidas} invГЎlida${res.invalidas === 1 ? '' : 's'}` : ''));
    UI.render();
  },
  importarReceitasArquivo(input) {
    const f = input.files[0];
    input.value = ''; // permite reescolher o mesmo arquivo
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const el = document.getElementById('ir-json');
      if (el) { el.value = reader.result; UI.confirmarImportacaoReceitas(); }
    };
    reader.readAsText(f);
  },

  exportarJSON() {
    const dump = { versao: 1, exportadoEm: new Date().toISOString(),
      receitas: S.receitas, estoque: S.estoque, plano: S.plano, lista: S.lista, config: S.config };
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `chefprep-backup-${U.hojeISO()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    UI.toast('Backup exportado вң“');
  },
  importarJSON(input) {
    const f = input.files[0];
    input.value = ''; // permite escolher o MESMO arquivo de novo (onchange nГЈo dispara com value igual)
    if (!f) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || typeof d !== 'object' || !Array.isArray(d.receitas)) throw new Error('formato');
        // valida e normaliza ANTES de apagar qualquer coisa (keyPath 'id' Г© obrigatГіrio no IndexedDB)
        const dump = {};
        for (const s of ['receitas', 'estoque', 'plano', 'lista']) {
          dump[s] = (Array.isArray(d[s]) ? d[s] : [])
            .filter(it => it && typeof it === 'object')
            .map(it => (it.id ? it : Object.assign({ id: U.id() }, it)));
        }
        if (!confirm('Importar vai substituir todos os dados atuais. Continuar?')) return;
        for (const s of ['receitas', 'estoque', 'plano', 'lista']) {
          await DB.limpar(s);
          for (const item of dump[s]) await DB.salvar(s, item);
        }
        if (d.config && typeof d.config === 'object') {
          d.config.id = 'cfg'; await DB.salvar('config', d.config);
        }
        await carregarTudo();
        UI.fecharOverlay(); UI.toast('Dados importados вң“'); UI.render();
      } catch (e) {
        console.error('importarJSON:', e);
        UI.toast('Arquivo invГЎlido вҖ” use um backup do ChefPrep');
      }
    };
    reader.readAsText(f);
  }
};

/* ============ INICIALIZAГҮГғO ============ */
(async function init() {
  try {
    await DB.abrir();
    await carregarTudo();
    vincularEstoqueAntigo(); // convergГӘncia direta: vincula itens antigos ao vocabulГЎrio
    const jaInstalado = !!(S.config.seeded || S.config.seedVersion); // ANTES de semear (semear sempre grava seedVersion)
    const novas = await semearReceitas();
    if (novas && jaInstalado) UI._toastInicial = novas + ' receitas novas adicionadas ao banco!';
    UI.render();
    if (UI._toastInicial) { UI.toast('\u{1F4D6} ' + UI._toastInicial); UI._toastInicial = null; }
    // ProteГ§ГЈo dos dados: pede ao navegador para NГғO despejar o IndexedDB
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
    // PWA: service worker (sГі http/https; em file:// falha silenciosamente)
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.onupdatefound = () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.onstatechange = () => {
            if (nw.state === 'activated' && navigator.serviceWorker.controller)
              UI.toast('App atualizado para a versГЈo mais recente вң“');
          };
        };
      }).catch(() => {});
    }
    // wake lock cai quando a aba perde foco вҖ” readquire se ainda cozinhando
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && document.querySelector('.cozinhando')) {
        UI._wake = null; UI.ativarWakeLock();
      }
    });
  } catch (e) {
    document.getElementById('tela').innerHTML =
