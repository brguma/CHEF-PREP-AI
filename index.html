/* ============ SEMEADURA VERSIONADA ============
   Para lançar receitas novas: adicionar em RECEITAS_SEED e subir SEED_VERSION.
   Instalações existentes recebem só as inéditas (por nome canônico),
   sem duplicar, sem tocar em favoritos/edições e respeitando exclusões. */
const SEED_VERSION = 6;
async function semearReceitas() {
  const versaoLocal = S.config.seedVersion || (S.config.seeded ? 1 : 0);
  if (versaoLocal >= SEED_VERSION) return 0;
  const existentes = new Set(S.receitas.map(r => canonico(r.nome)));
  const removidas = new Set(S.config.removidasSeed || []);
  let n = 0;
  for (const r of RECEITAS_SEED) {
    const c = canonico(r.nome);
    if (existentes.has(c) || removidas.has(c)) continue;
    const rec = Object.assign({ id: U.id(), favorito: false, origem: 'seed' }, r);
    S.receitas.push(rec);
    await DB.salvar('receitas', rec);
    n++;
  }
  S.config.seedVersion = SEED_VERSION;
  S.config.seeded = true;
  await DB.salvar('config', S.config);
  return n;
}

/* ============ IMPORTAÇÃO DE RECEITAS (RecipeImporter v1 — via JSON) ============
   Fluxo: a pessoa pede a um assistente de IA (Claude etc.) para converter a
   receita dela neste formato JSON, cola no app e importa. */
const CATEGORIAS_VALIDAS = ['Prato principal','Acompanhamento','Rápido','Doce','Salada','Sopa','Molho/Tempero','Conserva'];
const PROMPT_IMPORTACAO = 'Converta a(s) receita(s) que vou enviar para JSON no formato do app ChefPrep. Responda APENAS com o JSON (um array), sem explicacoes e sem markdown. Formato de cada receita: {"nome":"...","categoria":"Prato principal|Acompanhamento|Rapido|Doce|Salada|Sopa|Molho/Tempero|Conserva","tags":["ate 5 tags curtas"],"tempoMin":30,"porcoesBase":4,"ingredientes":[{"nome":"ingrediente generico em minusculas (ex: frango, tomate, oleo)","qtd":2,"unidade":"g|kg|ml|l|un|xic|col sopa|col cha|dente|folha|pitada|lata|maco|a gosto","opcional":false,"critico":false}],"passos":["frases curtas e diretas, com tempos explicitos quando houver, ex: cozinhe por 15 min"],"nutri":null}. Marque critico:true apenas nos 1-2 ingredientes essenciais (proteina ou base) e opcional:true nos dispensaveis. Minha(s) receita(s): ';
function validarReceitaImportada(o) {
  if (!o || typeof o !== 'object') return null;
  const nome = (o.nome || '').toString().trim();
  if (!nome || nome.length > 80) return null;
  const ingredientes = (Array.isArray(o.ingredientes) ? o.ingredientes : [])
    .map(i => ({
      nome: (i && i.nome || '').toString().trim().toLowerCase(),
      qtd: parseFloat(String(i && i.qtd).replace(',', '.')) || 1,
      unidade: (i && i.unidade || 'un').toString().trim(),
      opcional: !!(i && i.opcional),
      critico: !!(i && i.critico)
    })).filter(i => i.nome);
  const passos = (Array.isArray(o.passos) ? o.passos : [])
    .map(p => String(p).trim()).filter(Boolean);
  if (ingredientes.length < 2 || passos.length < 2) return null;
  const n = o.nutri;
  return {
    id: U.id(), nome,
    categoria: CATEGORIAS_VALIDAS.includes(o.categoria) ? o.categoria : 'Prato principal',
    tags: (Array.isArray(o.tags) ? o.tags : []).map(t => String(t).trim()).filter(Boolean).slice(0, 6),
    tempoMin: Math.max(1, +o.tempoMin || 30),
    porcoesBase: Math.max(1, +o.porcoesBase || 4),
    ingredientes, passos,
    equipamentos: (Array.isArray(o.equipamentos) ? o.equipamentos : []).map(String).slice(0, 6),
    nutri: n && typeof n === 'object'
      ? { kcal: +n.kcal || 0, prot: +n.prot || 0, carb: +n.carb || 0, gord: +n.gord || 0 } : null,
    favorito: false, origem: 'importada'
  };
}
function importarReceitasDeTexto(txt) {
  txt = (txt || '').trim()
    .replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
  let dados;
  try { dados = JSON.parse(txt); } catch (e) { return { erro: 'JSON inválido — copie a resposta completa do assistente' }; }
  if (!Array.isArray(dados)) dados = [dados];
  const existentes = new Set(S.receitas.map(r => canonico(r.nome)));
  let ok = 0, puladas = 0, invalidas = 0;
  for (const o of dados) {
    const r = validarReceitaImportada(o);
    if (!r) { invalidas++; continue; }
    const c = canonico(r.nome);
    if (existentes.has(c)) { puladas++; continue; }
    existentes.add(c);
    S.receitas.push(r);
    DB.salvar('receitas', r);
    ok++;
  }
  return { ok, puladas, invalidas };
}

/* ============ ENGINES DETERMINÍSTICOS ============ */

/* --- Índice do estoque por nome canônico --- */
function indiceEstoque() {
  const idx = {};
  for (const it of S.estoque) {
    const c = canonico(it.nome);
    if (!idx[c]) idx[c] = [];
    idx[c].push(it);
  }
  return idx;
}

/* --- SuggestionProvider (contrato fixo — a v2 com IA implementa a mesma interface)
   entrada:  { receitas, estoque, opcoes }
   saída:    [{ receita, score, tem[], faltam[], faltaCritico, badge, usaVencendo }] --- */
const SuggestionProvider = {
  nome: 'deterministico-v1',
  sugerir({ receitas, opcoes = {} } = {}) {
    const idx = indiceEstoque();
    const diasAlerta = S.config.diasAlertaValidade;
    const res = [];
    for (const r of receitas) {
      const obrig = r.ingredientes.filter(i => !i.opcional);
      if (!obrig.length) continue;
      const tem = [], faltam = [];
      let usaVencendo = false, faltaCritico = false;
      for (const ing of obrig) {
        const c = canonico(ing.nome);
        if (ehBasico(c)) { tem.push(ing); continue; } // básico: sempre disponível
        if (idx[c] && idx[c].some(e => e.qtd > 0)) {
          tem.push(ing);
          if (idx[c].some(e => {
            const d = U.diasAte(e.validade);
            return d !== null && d >= 0 && d <= diasAlerta;
          })) usaVencendo = true;
        } else {
          faltam.push(ing);
          if (ing.critico) faltaCritico = true;
        }
      }
      let score = tem.length / obrig.length;
      if (usaVencendo) score += 0.15;          // prioriza reduzir desperdício
      if (r.favorito) score += 0.10;
      if (faltaCritico) score -= 0.30;         // proteína/base ausente pesa mais
      let badge = null;
      if (!faltam.length) badge = 'ok';
      else if (faltam.length === 1) badge = 'um';
      else if (tem.length / obrig.length >= 0.7) badge = 'quase';
      res.push({ receita: r, score, tem, faltam, faltaCritico, badge, usaVencendo });
    }
    res.sort((a, b) => b.score - a.score);
    return opcoes.limite ? res.slice(0, opcoes.limite) : res;
  }
};

/* --- Motor de Busca: texto + sinônimos + filtros + tolerância a erros ---
   Camadas (da mais barata à mais cara):
   1) substring exata (comportamento antigo, cobre a maioria)
   2) por token: prefixo ("frang grel" → Frango Grelhado), qualquer ordem
   3) singular/plural pt-BR (limões→limao, ovos→ovo)
   4) erro de digitação: distância OSA ≤1 (palavras ≥4) ou ≤2 (≥7),
      transposição conta 1 ("fragno" acha "frango") */
function distOSA(a, b, max) {
  if (Math.abs(a.length - b.length) > max) return max + 1;
  let ant2 = null, ant = [], cur = [];
  for (let j = 0; j <= b.length; j++) ant[j] = j;
  for (let i = 1; i <= a.length; i++) {
    cur = [i]; let melhor = i;
    for (let j = 1; j <= b.length; j++) {
      let c = Math.min(ant[j] + 1, cur[j - 1] + 1, ant[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
      if (i > 1 && j > 1 && a[i - 1] === b[j - 2] && a[i - 2] === b[j - 1])
        c = Math.min(c, ant2[j - 2] + 1); // transposição de letras vizinhas
      cur[j] = c; if (c < melhor) melhor = c;
    }
    if (melhor > max) return max + 1; // corte: já estourou a tolerância
    ant2 = ant; ant = cur;
  }
  return ant[b.length];
}
function raizPt(t) { // singular aproximado (bom o bastante junto com a distância)
  if (t.length <= 3) return t;
  if (t.endsWith('oes') || t.endsWith('aes')) return t.slice(0, -3) + 'ao';
  if (t.endsWith('s')) return t.slice(0, -1);
  return t;
}
function tokenCasa(q, alvo) {
  if (alvo.startsWith(q)) return true;                 // prefixo / palavra incompleta
  const rq = raizPt(q), ra = raizPt(alvo);
  if (ra.startsWith(rq)) return true;                  // plural/singular
  if (q[0] !== alvo[0]) return false;                  // typo raramente erra a 1ª letra
  const tol = q.length >= 9 ? 2 : q.length >= 5 ? 1 : 0;
  if (!tol) return false;
  return distOSA(q, alvo, tol) <= tol                  // palavra inteira com typo
    || distOSA(q, alvo.slice(0, q.length), tol) <= tol // prefixo com typo
    || distOSA(rq, ra, tol) <= tol;                    // raiz com typo
}
function buscarReceitas() {
  const f = S.filtroReceitas;
  const termo = U.norm(f.texto);
  const termoCan = canonico(f.texto);
  const termos = termo.split(' ').filter(Boolean)
    .flatMap(t => (SINONIMOS[t] || t).split(' ')); // expande sinônimo por palavra
  let out = S.receitas.filter(r => {
    if (f.cat !== 'todas' && r.categoria !== f.cat) return false;
    if (f.soFavoritas && !r.favorito) return false;
    if (!termo) return true;
    const alvo = U.norm(r.nome + ' ' + r.categoria + ' ' + (r.tags || []).join(' '))
      + ' ' + r.ingredientes.map(i => canonico(i.nome) + ' ' + U.norm(i.nome)).join(' ');
    if (alvo.includes(termo) || alvo.includes(termoCan)) return true; // caminho rápido
    const alvoTokens = alvo.split(' ');
    // fuzzy: TODA palavra buscada precisa casar com ALGUMA palavra do alvo (ordem livre)
    return termos.every(q => alvoTokens.some(a => tokenCasa(q, a)));
  });
  if (f.soPossiveis) {
    const ok = new Set(SuggestionProvider.sugerir({ receitas: out })
      .filter(s => s.badge === 'ok').map(s => s.receita.id));
    out = out.filter(r => ok.has(r.id));
  }
  return out;
}

/* --- Gerador de lista de compras: diff(receita − estoque) --- */
function itensFaltantes(receita, porcoes) {
  const idx = indiceEstoque();
  const fator = porcoes / receita.porcoesBase;
  return receita.ingredientes
    .filter(i => !i.opcional)
    .filter(i => !ehBasico(i.nome))
    .filter(i => !(idx[canonico(i.nome)] || []).some(e => e.qtd > 0))
    .map(i => ({ nome: i.nome, qtd: Math.round(i.qtd * fator * 100) / 100, unidade: i.unidade }));
}
function addNaLista(itens, origem) {
  let n = 0;
  for (const it of itens) {
    const c = canonico(it.nome);
    const jaTem = S.lista.find(l => !l.comprado && canonico(l.nome) === c);
    if (jaTem) continue;
    const novo = { id: U.id(), nome: it.nome, qtd: it.qtd || null,
                   unidade: it.unidade || '', comprado: false, origem: origem || 'manual' };
    S.lista.push(novo); DB.salvar('lista', novo); n++;
  }
  return n;
}

/* --- Baixa de estoque ao cozinhar (best-effort: só quando a unidade bate) --- */
function darBaixa(receita, porcoes) {
  const idx = indiceEstoque();
  const fator = porcoes / receita.porcoesBase;
  let baixados = 0;
  for (const ing of receita.ingredientes.filter(i => !i.opcional)) {
    const itens = idx[canonico(ing.nome)] || [];
    // consome primeiro o que vence antes
    itens.sort((a, b) => (a.validade || '9999') < (b.validade || '9999') ? -1 : 1);
    let precisa = ing.qtd * fator;
    for (const e of itens) {
      if (precisa <= 0) break;
      if (U.norm(e.unidade) !== U.norm(ing.unidade)) continue; // unidade diferente: não arrisca
      const usa = Math.min(e.qtd, precisa);
      e.qtd = Math.round((e.qtd - usa) * 100) / 100;
      precisa -= usa; baixados++;
      if (e.qtd <= 0) { DB.remover('estoque', e.id); S.estoque = S.estoque.filter(x => x.id !== e.id); }
      else DB.salvar('estoque', e);
    }
  }
  return baixados;
}

/* --- Itens do estoque vencendo --- */
function vencendo() {
  return S.estoque.filter(e => {
    const d = U.diasAte(e.validade);
    return d !== null && d <= S.config.diasAlertaValidade;
  }).sort((a, b) => (a.validade || '') < (b.validade || '') ? -1 : 1);
}

/* ============ UI ============ */
const UI = {
  ir(tab) {
    S.tab = tab;
    document.querySelectorAll('.nav-item').forEach(b =>
      b.classList.toggle('ativo', b.dataset.tab === tab));
    UI.render();
    window.scrollTo(0, 0);
  },
  render() {
    const t = document.getElementById('tela');
    t.innerHTML = ({ inicio: UI.vInicio, receitas: UI.vReceitas, estoque: UI.vEstoque,
                     plano: UI.vPlano, lista: UI.vLista }[S.tab])();
  },
  toast(msg) {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  },
  /* Toast com botão Desfazer (5s). O item já foi removido do estado e do banco;
     desfazer = reinserir. Simples e sem timers de exclusão pendente. */
  toastDesfazer(msg, aoDesfazer) {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const el = document.createElement('div');
    el.className = 'toast com-acao';
    const sp = document.createElement('span');
    sp.className = 'toast-msg'; sp.textContent = msg;
    const btn = document.createElement('button');
    btn.className = 'toast-desfazer'; btn.type = 'button'; btn.textContent = 'Desfazer';
    const timer = setTimeout(() => el.remove(), 5000);
    btn.addEventListener('click', () => { clearTimeout(timer); el.remove(); aoDesfazer(); });
    el.append(sp, btn);
    document.body.appendChild(el);
  },
  fecharOverlay() {
    document.getElementById('overlays').innerHTML = '';
    UI.soltarWakeLock(); // timer, se houver, continua rodando e avisa ao fim
  },
  folha(titulo, corpoHTML) {
    document.getElementById('overlays').innerHTML =
      `<div class="overlay" onclick="if(event.target===this)UI.fecharOverlay()">
        <div class="folha" role="dialog" aria-label="${U.esc(titulo)}">
          <div class="folha-topo"><h2>${U.esc(titulo)}</h2>
            <button class="btn-fechar" onclick="UI.fecharOverlay()" aria-label="Fechar">✕</button></div>
          ${corpoHTML}
        </div></div>`;
  },

  /* ---------- INÍCIO ---------- */
  vInicio() {
    const sug = SuggestionProvider.sugerir({ receitas: S.receitas });
    const prontas = sug.filter(s => s.badge === 'ok');
    const f1 = sug.filter(s => s.faltam.length === 1).slice(0, 4);
    const f2 = sug.filter(s => s.faltam.length === 2).slice(0, 3);
    const f3 = sug.filter(s => s.faltam.length === 3).slice(0, 3);
    const venc = vencendo();
    let h = `<div class="hero">
      <div class="pergunta">O que dá pra fazer hoje?</div>
      <div class="numerao">${prontas.length} receita${prontas.length === 1 ? '' : 's'}</div>
      <div class="resposta">${prontas.length
        ? 'prontas para ir ao fogo com o que você já tem.'
        : S.estoque.length ? 'completas por enquanto — veja abaixo o que falta pouco.' : 'Cadastre seu estoque para eu cruzar com as receitas.'}</div>
    </div>`;
    if (venc.length) {
      h += `<div class="alerta-validade">⏳ <b>${venc.length} ite${venc.length === 1 ? 'm precisa' : 'ns precisam'} de atenção:</b>
        ${venc.slice(0, 4).map(e => {
          const d = U.diasAte(e.validade);
          return U.esc(e.nome) + (d < 0 ? ' (vencido)' : d === 0 ? ' (hoje!)' : ` (${d}d)`);
        }).join(', ')}.
        As sugestões abaixo já priorizam usá-los.</div>`;
    }
    if (prontas.length) {
      h += `<div class="secao-rotulo">Pode fazer agora</div>`;
      h += prontas.slice(0, 6).map(s => UI.cardSugestao(s)).join('');
    }
    if (f1.length) {
      h += `<div class="secao-rotulo">Falta só 1 item</div>`;
      h += f1.map(s => UI.cardSugestao(s)).join('');
    }
    if (f2.length) {
      h += `<div class="secao-rotulo">Faltam 2 itens</div>`;
      h += f2.map(s => UI.cardSugestao(s)).join('');
    }
    if (f3.length) {
      h += `<div class="secao-rotulo">Faltam 3 itens</div>`;
      h += f3.map(s => UI.cardSugestao(s)).join('');
    }
    if (!prontas.length && !f1.length && !f2.length && !f3.length && S.estoque.length) {
      h += `<div class="vazio" style="margin-top:16px"><b>Nenhum cruzamento ainda</b>
        Adicione mais itens ao estoque ou cadastre novas receitas.</div>`;
    }
    h += `<div class="secao-rotulo">Atalhos</div>
      <div class="atalhos">
        <button class="atalho" onclick="UI.formEstoque()"><span>🧊</span>Adicionar ao estoque</button>
        <button class="atalho" onclick="UI.formReceita()"><span>📖</span>Nova receita</button>
        <button class="atalho" onclick="UI.ir('plano')"><span>📅</span>Planejar semana</button>
        <button class="atalho" onclick="UI.ir('lista')"><span>🛒</span>Lista de compras</button>
      </div>`;
    return h;
  },
  cardSugestao(s) {
    const r = s.receita;
    const cls = s.badge === 'ok' ? 'pronta' : 'quase';
    const badges = { ok: '<span class="badge ok">Pode fazer agora</span>',
      um: '<span class="badge um">Falta 1 item</span>',
      quase: '<span class="badge quase">Quase lá</span>' };
    const obrig = s.tem.length + s.faltam.length;
    let h = `<div class="card ${cls}">
      <div class="card-topo"><div>
        <h3>${U.esc(r.nome)}</h3>
        <div class="meta">${U.esc(r.categoria)} · ⏱ ${r.tempoMin} min · ${r.porcoesBase} porções${s.usaVencendo ? ' · <span class="badge venc">usa item vencendo</span>' : ''}</div>
      </div>${badges[s.badge] || ''}</div>
      <div class="placar" aria-label="${s.tem.length} de ${obrig} ingredientes disponíveis">
        ${s.tem.map(() => '<i class="pt tem"></i>').join('')}${s.faltam.map(() => '<i class="pt falta"></i>').join('')}
      </div>`;
    if (s.faltam.length)
      h += `<div class="placar-legenda">Falta: <b>${s.faltam.map(i => U.esc(i.nome)).join(', ')}</b></div>`;
    h += `<div class="card-acoes">
      <button class="btn btn-mini btn-primario" onclick="UI.detalheReceita('${r.id}')">Ver receita</button>`;
    if (s.faltam.length)
      h += `<button class="btn btn-mini btn-contorno" onclick="UI.faltantesPraLista('${r.id}')">+ Faltantes na lista</button>`;
    h += `</div></div>`;
    return h;
  },
  faltantesPraLista(id) {
    const r = S.receitas.find(x => x.id === id);
    const n = addNaLista(itensFaltantes(r, r.porcoesBase), 'receita: ' + r.nome);
    UI.toast(n ? `${n} ite${n === 1 ? 'm' : 'ns'} na lista de compras` : 'Itens já estavam na lista');
    UI.render();
  },

  /* ---------- RECEITAS ---------- */
  vReceitas() {
    const f = S.filtroReceitas;
    const cats = ['todas', ...new Set(S.receitas.map(r => r.categoria))];
    UI._cats = cats; // referência por índice: nome de categoria nunca entra em string de código
    if (!cats.includes(f.cat)) f.cat = 'todas'; // filtro órfão (categoria removida)
    const lista = buscarReceitas();
    const sugMap = {};
    SuggestionProvider.sugerir({ receitas: lista }).forEach(s => sugMap[s.receita.id] = s);
    let h = `<div class="barra-busca">
      <input type="search" placeholder="Buscar por nome ou ingrediente…" value="${U.esc(f.texto)}"
        oninput="S.filtroReceitas.texto=this.value;UI.renderSoLista()" aria-label="Buscar receitas">
      <button class="btn btn-contorno" onclick="UI.importarReceitas()" aria-label="Importar receitas">\u{1F4E5}</button>
      <button class="btn btn-primario" onclick="UI.formReceita()">＋</button>
    </div>
    <div class="chips">
      ${cats.map((c, i) => `<button class="chip ${f.cat === c ? 'ativo' : ''}"
        onclick="S.filtroReceitas.cat=UI._cats[${i}];UI.render()">${c === 'todas' ? 'Todas' : U.esc(c)}</button>`).join('')}
      <button class="chip ${f.soFavoritas ? 'ativo' : ''}"
        onclick="S.filtroReceitas.soFavoritas=!S.filtroReceitas.soFavoritas;UI.render()">★ Favoritas</button>
      <button class="chip ${f.soPossiveis ? 'ativo' : ''}"
        onclick="S.filtroReceitas.soPossiveis=!S.filtroReceitas.soPossiveis;UI.render()">✓ Posso fazer</button>
    </div>
    <div id="lista-receitas">${UI.htmlListaReceitas(lista, sugMap)}</div>`;
    return h;
  },
  renderSoLista() {
    const lista = buscarReceitas();
    const sugMap = {};
    SuggestionProvider.sugerir({ receitas: lista }).forEach(s => sugMap[s.receita.id] = s);
    const el = document.getElementById('lista-receitas');
    if (el) el.innerHTML = UI.htmlListaReceitas(lista, sugMap);
  },
  htmlListaReceitas(lista, sugMap) {
    if (!lista.length) return `<div class="vazio"><b>Nada encontrado</b>
      Tente outro termo — a busca também procura por ingrediente (ex.: "frango", "macaxeira").</div>`;
    return lista.map(r => {
      const s = sugMap[r.id];
      return `<div class="card ${s && s.badge === 'ok' ? 'pronta' : ''}">
        <div class="card-topo"><div>
          <h3>${U.esc(r.nome)}</h3>
          <div class="meta">${U.esc(r.categoria)} · ⏱ ${r.tempoMin} min · ${r.porcoesBase} porções</div>
        </div>
        <button class="btn-fav" onclick="UI.toggleFav('${r.id}')" aria-label="Favoritar">${r.favorito ? '★' : '☆'}</button></div>
        ${s && s.badge === 'ok' ? '<div style="margin-top:6px"><span class="badge ok">Pode fazer agora</span></div>' : ''}
        <div class="card-acoes">
          <button class="btn btn-mini btn-primario" onclick="UI.detalheReceita('${r.id}')">Abrir</button>
        </div></div>`;
    }).join('');
  },
  toggleFav(id) {
    const r = S.receitas.find(x => x.id === id);
    r.favorito = !r.favorito; DB.salvar('receitas', r); UI.render();
  },

  /* ---------- DETALHE + ESCALONAMENTO ---------- */
  detalheReceita(id, porcoes) {
    const r = S.receitas.find(x => x.id === id);
    if (!r) return;
    const p = porcoes || r.porcoesBase;
    const fator = p / r.porcoesBase;
    const idx = indiceEstoque();
    const ingHTML = r.ingredientes.map(i => {
      const temEstoque = (idx[canonico(i.nome)] || []).some(e => e.qtd > 0);
      const basico = !temEstoque && ehBasico(i.nome);
      return `<div class="ing-linha ${temEstoque || basico || i.opcional ? '' : 'sem'}">
        <i class="pt ${temEstoque ? 'tem' : basico ? 'bas' : (i.opcional ? 'opc' : 'falta')}"
           title="${basico ? 'básico da despensa' : ''}"></i>
        <span>${U.esc(i.nome)}${i.opcional ? ' <small style="color:var(--cinza)">(opcional)</small>' : basico ? ' <small style="color:#5B84C4">(básico)</small>' : ''}</span>
        <span class="qtd-ing">${U.fmtQtd(i.qtd * fator)} ${U.esc(i.unidade)}</span></div>`;
    }).join('');
    const passosHTML = r.passos.map((pp, i) =>
      `<div class="passo"><div class="n">${i + 1}</div><div>${U.esc(pp)}</div></div>`).join('');
    const nutri = r.nutri ? `<div class="dica" style="margin-top:10px">Por porção: ${r.nutri.kcal} kcal · P ${r.nutri.prot}g · C ${r.nutri.carb}g · G ${r.nutri.gord}g</div>` : '';
    const faltam = itensFaltantes(r, p);
    UI.folha(r.nome, `
      <div class="det-cab">
        <div class="det-meta"><span>${U.esc(r.categoria)}</span><span>⏱ ${r.tempoMin} min</span>
          ${(r.equipamentos || []).length ? '<span>🍳 ' + r.equipamentos.map(U.esc).join(', ') + '</span>' : ''}</div>
        ${(r.tags || []).length ? '<div class="det-meta">' + r.tags.map(t => '<span class="badge quase">' + U.esc(t) + '</span>').join('') + '</div>' : ''}
      </div>
      <div class="porcoes-ctl">
        <span class="rotulo">Porções</span>
        <button class="stepper" onclick="UI.detalheReceita('${r.id}',${Math.max(1, p - 1)})">−</button>
        <span class="num">${p}</span>
        <button class="stepper" onclick="UI.detalheReceita('${r.id}',${p + 1})">＋</button>
      </div>
      <div class="secao-rotulo">Ingredientes</div>${ingHTML}${nutri}
      <div class="secao-rotulo">Modo de preparo</div>${passosHTML}
      <div class="card-acoes" style="margin-top:18px">
        <button class="btn btn-verde" onclick="UI.modoCozinhando('${r.id}',${p})">🔥 Cozinhar passo a passo</button>
        ${faltam.length ? `<button class="btn btn-contorno" onclick="UI.faltantesPraLista('${r.id}');UI.fecharOverlay()">+ Faltantes na lista</button>` : ''}
        <button class="btn btn-contorno" onclick="UI.addAoPlano('${r.id}')">📅 Planejar</button>
      </div>
      <div class="card-acoes">
        <button class="btn btn-mini btn-contorno" onclick="UI.formReceita('${r.id}')">Editar</button>
        <button class="btn btn-mini btn-perigo" onclick="UI.removerReceita('${r.id}')">Excluir</button>
      </div>`);
  },
  removerReceita(id) {
    const r = S.receitas.find(x => x.id === id);
    if (!r) return;
    const eraSeed = r.origem === 'seed';
    if (eraSeed) { // não volta quando o banco atualizar
      (S.config.removidasSeed = S.config.removidasSeed || []).push(canonico(r.nome));
      DB.salvar('config', S.config);
    }
    S.receitas = S.receitas.filter(x => x.id !== id);
    DB.remover('receitas', id); UI.fecharOverlay(); UI.render();
    UI.toastDesfazer('Receita removida', () => {
      S.receitas.push(r); DB.salvar('receitas', r);
      if (eraSeed) {
        S.config.removidasSeed = (S.config.removidasSeed || []).filter(c => c !== canonico(r.nome));
        DB.salvar('config', S.config);
      }
      UI.render();
    });
  },

  /* ---------- MODO COZINHANDO ---------- */
  modoCozinhando(id, porcoes, passo = 0) {
    const r = S.receitas.find(x => x.id === id);
    if (!r) { UI.fecharOverlay(); return; }
    const total = r.passos.length;
    const fim = passo >= total;
    UI.ativarWakeLock(); // tela não apaga com a mão na massa
    const seg = fim ? null : UI.detectarTempo(r.passos[passo]);
    const timerAtivo = !!UI._timerInt;
    document.getElementById('overlays').innerHTML = `
      <div class="cozinhando">
        <div class="coz-topo"><span>${U.esc(r.nome)}</span>
          <span style="display:flex;gap:10px;align-items:center">
            ${timerAtivo ? `<button id="coz-timer" class="coz-timer" onclick="UI.cancelarTimer()" title="Tocar para cancelar">⏱ …</button>` : ''}
            <button onclick="UI.fecharOverlay()" style="color:#fff;font-size:15px" aria-label="Sair">✕ Sair</button>
          </span></div>
        <div class="coz-progresso">${r.passos.map((_, i) =>
          `<i class="${i < passo || fim ? 'feito' : ''}"></i>`).join('')}</div>
        <div class="coz-corpo">
          ${fim
            ? `<div class="coz-num">Pronto!</div>
               <div class="coz-texto">Receita finalizada. Bom apetite! 🍽<br><br>
               <span style="font-size:15px;opacity:.85">Quer dar baixa dos ingredientes usados no estoque?</span></div>`
            : `<div class="coz-num">Passo ${passo + 1} de ${total}</div>
               <div class="coz-texto">${U.esc(r.passos[passo])}</div>
               ${seg ? `<button class="btn-timer"
                 onclick="UI.iniciarTimer(${seg},'Passo ${passo + 1} — ${U.esc(r.nome)}');UI.modoCozinhando('${r.id}',${porcoes},${passo})">⏱ Cronometrar ${UI.fmtTempo(seg).replace(/^0?(\d+):00$/, '$1 min')}</button>` : ''}`}
        </div>
        <div class="coz-nav">
          ${fim
            ? `<button class="btn btn-volta" onclick="UI.fecharOverlay()">Agora não</button>
               <button class="btn btn-avanca" onclick="UI.baixaEstoque('${r.id}',${porcoes})">Dar baixa ✓</button>`
            : `<button class="btn btn-volta" ${passo === 0 ? 'disabled style="opacity:.4"' : ''}
                 onclick="UI.modoCozinhando('${r.id}',${porcoes},${passo - 1})">← Voltar</button>
               <button class="btn btn-avanca" onclick="UI.modoCozinhando('${r.id}',${porcoes},${passo + 1})">
                 ${passo === total - 1 ? 'Finalizar ✓' : 'Próximo →'}</button>`}
        </div>
      </div>`;
    if (timerAtivo) UI._tickTimer();
  },
  baixaEstoque(id, porcoes) {
    const r = S.receitas.find(x => x.id === id);
    const n = darBaixa(r, porcoes);
    UI.fecharOverlay();
    UI.toast(n ? 'Estoque atualizado ✓' : 'Nada para baixar (unidades diferentes)');
    UI.render();
  },

  /* ---------- ESTOQUE ---------- */
  vEstoque() {
    const locais = ['todos', 'geladeira', 'freezer', 'despensa'];
    const rot = { todos: 'Tudo', geladeira: '🧊 Gelad.', freezer: '❄️ Freezer', despensa: '🥫 Desp.' };
    let itens = S.estoque.slice().sort((a, b) =>
      (a.validade || '9999') < (b.validade || '9999') ? -1 : 1);
    if (S.filtroEstoque !== 'todos') itens = itens.filter(e => e.local === S.filtroEstoque);
    let h = `<div class="abas-local">${locais.map(l =>
      `<button class="aba-local ${S.filtroEstoque === l ? 'ativo' : ''}"
        onclick="S.filtroEstoque='${l}';UI.render()">${rot[l]}</button>`).join('')}</div>
      <button class="btn btn-primario" style="width:100%;justify-content:center;margin-bottom:14px"
        onclick="UI.formEstoque()">＋ Adicionar item</button>`;
    if (!itens.length) {
      h += `<div class="vazio"><b>Estoque vazio${S.filtroEstoque !== 'todos' ? ' aqui' : ''}</b>
        Adicione o que tem em casa — é o cruzamento com as receitas que faz o app funcionar.</div>`;
      return h;
    }
    h += itens.map(e => {
      const d = U.diasAte(e.validade);
      const cls = d !== null && d < 0 ? 'vencido' : (d !== null && d <= S.config.diasAlertaValidade ? 'vencendo' : '');
      const val = e.validade
        ? (d < 0 ? `<span style="color:var(--borda-rim);font-weight:700">vencido há ${-d}d</span>`
          : d === 0 ? `<span style="color:var(--borda-rim);font-weight:700">vence hoje</span>`
          : d <= S.config.diasAlertaValidade ? `<span style="color:var(--mostarda);font-weight:700">vence em ${d}d</span>`
          : `val. ${e.validade.split('-').reverse().join('/')}`)
        : '';
      return `<div class="item-estoque ${cls}">
        <div class="item-info"><b>${U.esc(e.nome)}</b>
          <small>${{geladeira:'🧊 Geladeira',freezer:'❄️ Freezer',despensa:'🥫 Despensa'}[e.local] || ''} ${val ? '· ' + val : ''}</small></div>
        <div class="item-qtd">
          <button class="stepper" onclick="UI.mudaQtd('${e.id}',-1)">−</button>
          <span class="valor">${U.fmtQtd(e.qtd)} ${U.esc(e.unidade)}</span>
          <button class="stepper" onclick="UI.mudaQtd('${e.id}',1)">＋</button>
        </div>
        <button class="btn-fav" style="color:var(--cinza)" onclick="UI.removerEstoque('${e.id}')" aria-label="Remover">🗑</button>
      </div>`;
    }).join('');
    return h;
  },
  mudaQtd(id, delta) {
    const e = S.estoque.find(x => x.id === id);
    if (!e) { UI.render(); return; } // item já removido — só ressincroniza a tela
    const passo = ['g', 'ml'].includes(U.norm(e.unidade)) ? 50 : (['kg', 'l'].includes(U.norm(e.unidade)) ? 0.5 : 1);
    e.qtd = Math.max(0, Math.round((e.qtd + delta * passo) * 100) / 100);
    if (e.qtd === 0) {
      // acabou → oferece repor
      if (confirm(`"${e.nome}" acabou. Adicionar à lista de compras?`))
        addNaLista([{ nome: e.nome, qtd: null, unidade: e.unidade }], 'reposição');
      S.estoque = S.estoque.filter(x => x.id !== id);
      DB.remover('estoque', id);
    } else DB.salvar('estoque', e);
    UI.render();
  },
  removerEstoque(id) {
    const e = S.estoque.find(x => x.id === id);
    if (!e) return;
    S.estoque = S.estoque.filter(x => x.id !== id);
    DB.remover('estoque', id); UI.render();
    UI.toastDesfazer(`"${e.nome}" removido do estoque`, () => {
      S.estoque.push(e); DB.salvar('estoque', e); UI.render();
    });
  },
  formEstoque() {
    UI.folha('Adicionar ao estoque', `
      <div class="campo"><label>Item</label>
        <input id="fe-nome" placeholder="Ex.: frango, tomate, macaxeira…" autocomplete="off"></div>
      <div class="linha-3">
        <div class="campo"><label>Local</label>
          <select id="fe-local"><option value="geladeira">Geladeira</option>
            <option value="freezer">Freezer</option><option value="despensa">Despensa</option></select></div>
        <div class="campo"><label>Qtd</label><input id="fe-qtd" type="number" step="any" value="1" inputmode="decimal"></div>
        <div class="campo"><label>Unidade</label>
          <select id="fe-un"><option>un</option><option>g</option><option>kg</option>
            <option>ml</option><option>l</option><option>xíc</option><option>col sopa</option>
            <option>col chá</option><option>dente</option><option>pacote</option><option>lata</option></select></div>
      </div>
      <div class="campo"><label>Validade (opcional)</label><input id="fe-val" type="date">
        <div class="dica">Itens com validade próxima puxam receitas que os usam para o topo das sugestões.</div></div>
      <button class="btn btn-primario" style="width:100%;justify-content:center"
        onclick="UI.salvarEstoque()">Salvar no estoque</button>`);
    setTimeout(() => document.getElementById('fe-nome').focus(), 100);
  },
  salvarEstoque() {
    const nome = document.getElementById('fe-nome').value.trim();
    if (!nome) { UI.toast('Dê um nome ao item'); return; }
    const item = { id: U.id(), nome, local: document.getElementById('fe-local').value,
      qtd: parseFloat(document.getElementById('fe-qtd').value) || 1,
      unidade: document.getElementById('fe-un').value,
      validade: document.getElementById('fe-val').value || null };
    S.estoque.push(item); DB.salvar('estoque', item);
    UI.fecharOverlay(); UI.toast(`"${nome}" no estoque ✓`); UI.render();
  },

  /* ---------- PLANO SEMANAL ---------- */
  vPlano() {
    const hoje = new Date();
    const dias = [...Array(7)].map((_, i) => {
      const d = new Date(hoje); d.setDate(hoje.getDate() + i);
      return U.isoLocal(d);
    });
    const refs = ['Almoço', 'Jantar'];
    const fitness = S.config.perfil === 'fitness';
    let h = `<div class="secao-rotulo">Próximos 7 dias</div>`;
    h += dias.map((iso, i) => {
      const dt = new Date(iso + 'T12:00:00');
      const entradas = S.plano.filter(p => p.data === iso);
      let macros = null;
      if (fitness) {
        // nutri é por porção; a meta é individual → soma 1 porção por refeição
        macros = { kcal: 0, prot: 0 };
        entradas.forEach(p => {
          const r = S.receitas.find(x => x.id === p.receitaId);
          if (r && r.nutri) { macros.kcal += r.nutri.kcal; macros.prot += r.nutri.prot; }
        });
      }
      return `<div class="dia-plano ${i === 0 ? 'hoje' : ''}">
        <h4>${U.diaSemana[dt.getDay()]} · ${dt.getDate()}/${dt.getMonth() + 1}
          ${i === 0 ? '<span class="hoje-tag">hoje</span>' : ''}</h4>
        ${refs.map(ref => {
          const p = entradas.find(e => e.refeicao === ref);
          const r = p && S.receitas.find(x => x.id === p.receitaId);
          return `<div class="refeicao"><span class="rotulo-ref">${ref}</span>
            ${r ? `<span class="nome-rec">${U.esc(r.nome)} <small style="color:var(--cinza)">(${p.porcoes}p)</small></span>
              <button class="btn-fav" style="color:var(--cinza);font-size:15px" onclick="UI.tirarDoPlano('${p.id}')">✕</button>`
              : `<button class="vago" style="text-align:left;background:none" onclick="UI.escolherReceitaPlano('${iso}','${ref}')">+ escolher receita</button>`}
          </div>`;
        }).join('')}
        ${macros && (macros.kcal > 0) ? `<div class="macro-dia">Planejado (por pessoa): ~${Math.round(macros.kcal)} kcal · ${Math.round(macros.prot)}g proteína (meta: ${S.config.metas.kcal} kcal / ${S.config.metas.prot}g)</div>` : ''}
      </div>`;
    }).join('');
    h += `<button class="btn btn-verde" style="width:100%;justify-content:center;margin-top:8px"
      onclick="UI.gerarListaDaSemana()">🛒 Gerar lista de compras da semana</button>
      <div class="dica" style="text-align:center;margin-top:8px">Compara os ingredientes planejados com seu estoque e adiciona só o que falta.</div>`;
    return h;
  },
  escolherReceitaPlano(data, refeicao) {
    UI.folha(`${refeicao} · ${data.split('-').reverse().slice(0, 2).join('/')}`,
      S.receitas.map(r => `<div class="card" style="padding:11px 13px;margin-bottom:8px">
        <div class="card-topo"><div><h3 style="font-size:15px">${U.esc(r.nome)}</h3>
          <div class="meta">⏱ ${r.tempoMin} min</div></div>
        <button class="btn btn-mini btn-primario"
          onclick="UI.confirmarPlano('${data}','${refeicao}','${r.id}')">Escolher</button></div></div>`).join('')
      || '<div class="vazio"><b>Sem receitas</b>Cadastre receitas primeiro.</div>');
  },
  confirmarPlano(data, refeicao, receitaId) {
    const r = S.receitas.find(x => x.id === receitaId);

  parseIngrediente(linha) {
    // "2 xíc arroz *" | "0,5 un cebola (opcional)" | "3 col sopa azeite" | "sal a gosto"
    linha = linha.trim();
    if (!linha) return null;
    const opcional = /\(opcional\)/i.test(linha);
    const critico = /\*\s*$/.test(linha.replace(/\(opcional\)/i, ''));
    linha = linha.replace(/\(opcional\)/i, '').replace(/\*\s*$/, '').trim();
    if (/\ba gosto\s*$/i.test(linha)) {
      const nome = linha.replace(/\ba gosto\s*$/i, '').trim();
      if (nome) return { nome, qtd: 1, unidade: 'a gosto', opcional: true, critico };
    }
    const m = linha.match(/^([\d.,]+)\s+(.+)$/);
    if (m) {
      const qtd = parseFloat(m[1].replace(',', '.'));
      let resto = m[2].trim(), unidade = null;
      // unidades de duas+ palavras têm prioridade sobre o corte na 1ª palavra
      const compostas = ['colher de sopa', 'colher de chá', 'col sopa', 'col chá'];
      for (const u of compostas) {
        if (U.norm(resto).startsWith(U.norm(u) + ' ')) {
          unidade = resto.slice(0, u.length);
          resto = resto.slice(u.length).trim();
          break;
        }
      }
      if (!unidade) {
        const sp = resto.indexOf(' ');
        if (sp > 0) { unidade = resto.slice(0, sp); resto = resto.slice(sp + 1).trim(); }
      }
      if (unidade && resto) return { nome: resto, qtd, unidade, opcional, critico };
    }
    return { nome: linha, qtd: 1, unidade: 'a gosto', opcional: true, critico: false };
  },
  salvarReceita(id) {
    const nome = document.getElementById('fr-nome').value.trim();
    if (!nome) { UI.toast('Dê um nome à receita'); return; }
    const ingredientes = document.getElementById('fr-ing').value.split('\n')
      .map(UI.parseIngrediente).filter(Boolean);
    const passos = document.getElementById('fr-passos').value.split('\n')
      .map(s => s.trim()).filter(Boolean);
    if (!ingredientes.length || !passos.length) { UI.toast('Preencha ingredientes e passos'); return; }
    let nutri = null;
    const k = document.getElementById('fr-kcal');
    if (k && k.value) nutri = {
      kcal: +k.value || 0, prot: +document.getElementById('fr-prot').value || 0,
      carb: +document.getElementById('fr-carb').value || 0, gord: +document.getElementById('fr-gord').value || 0 };
    const ant = id ? S.receitas.find(x => x.id === id) : null;
    const r = { id: id || U.id(), nome,
      categoria: document.getElementById('fr-cat').value,
      tempoMin: +document.getElementById('fr-tempo').value || 30,
      porcoesBase: +document.getElementById('fr-porc').value || 4,
      ingredientes, passos,
      tags: document.getElementById('fr-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      equipamentos: ant ? ant.equipamentos : [],
      nutri: nutri || (ant ? ant.nutri : null),
      favorito: ant ? ant.favorito : false, origem: 'manual' };
    if (ant) Object.assign(ant, r); else S.receitas.push(r);
    DB.salvar('receitas', r);
    UI.fecharOverlay(); UI.toast('Receita salva ✓'); UI.render();
  },

  /* ---------- TIMER DE PASSO ---------- */
  detectarTempo(txt) {
    let m = txt.match(/(\d+)\s*(?:a|–|-)\s*(\d+)\s*min/i);      // "4-5 min" → usa o maior
    if (m) return Math.max(+m[1], +m[2]) * 60;
    m = txt.match(/(\d+)\s*(?:min|minutos?)\b/i);
    if (m) return +m[1] * 60;
    m = txt.match(/(\d+)\s*(?:h|horas?)\b/i);
    if (m) return +m[1] * 3600;
    return null;
  },
  fmtTempo(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    return h ? `${h}:${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}`
             : `${m}:${String(ss).padStart(2, '0')}`;
  },
  iniciarTimer(seg, rotulo) {
    clearInterval(UI._timerInt);
    UI._timerFim = Date.now() + seg * 1000;
    UI._timerRot = rotulo;
    UI._timerInt = setInterval(UI._tickTimer, 500);
    UI._tickTimer();
  },
  _tickTimer() {
    const el = document.getElementById('coz-timer');
    const resta = Math.ceil((UI._timerFim - Date.now()) / 1000);
    if (resta <= 0) {
      clearInterval(UI._timerInt); UI._timerInt = null;
      if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 300]);
      UI.toast('⏰ ' + (UI._timerRot || 'Tempo!'));
      if (el) { el.textContent = '⏰ Tempo!'; el.classList.add('fim'); }
      return;
    }
    if (el) el.textContent = '⏱ ' + UI.fmtTempo(resta);
  },
  cancelarTimer() {
    clearInterval(UI._timerInt); UI._timerInt = null;
    const el = document.getElementById('coz-timer');
    if (el) el.remove();
  },

  exportarJSON() {
    const dump = { versao: 1, exportadoEm: new Date().toISOString(),
      receitas: S.receitas, estoque: S.estoque, plano: S.plano, lista: S.lista, config: S.config };
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `chefprep-backup-${U.hojeISO()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    UI.toast('Backup exportado ✓');
  },
  importarJSON(input) {
    const f = input.files[0];
    input.value = ''; // permite escolher o MESMO arquivo de novo (onchange não dispara com value igual)
    if (!f) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || typeof d !== 'object' || !Array.isArray(d.receitas)) throw new Error('formato');
        // valida e normaliza ANTES de apagar qualquer coisa (keyPath 'id' é obrigatório no IndexedDB)
        const dump = {};
        for (const s of ['receitas', 'estoque', 'plano', 'lista']) {
          dump[s] = (Array.isArray(d[s]) ? d[s] : [])
            .filter(it => it && typeof it === 'object')
            .map(it => (it.id ? it : Object.assign({ id: U.id() }, it)));
        }
        if (!confirm('Importar vai substituir todos os dados atuais. Continuar?')) return;
        for (const s of ['receitas', 'estoque', 'plano', 'lista']) {
          await DB.limpar(s);
          for (const item of dump[s]) await DB.salvar(s, item);
        }
        if (d.config && typeof d.config === 'object') {
          d.config.id = 'cfg'; await DB.salvar('config', d.config);
        }
        await carregarTudo();
        UI.fecharOverlay(); UI.toast('Dados importados ✓'); UI.render();
      } catch (e) {
        console.error('importarJSON:', e);
        UI.toast('Arquivo inválido — use um backup do ChefPrep');
      }
    };
    reader.readAsText(f);
  }
};

/* ============ INICIALIZAÇÃO ============ */
(async function init() {
  try {
    await DB.abrir();
    await carregarTudo();
    const jaInstalado = !!(S.config.seeded || S.config.seedVersion); // ANTES de semear (semear sempre grava seedVersion)
    const novas = await semearReceitas();
    if (novas && jaInstalado) UI._toastInicial = novas + ' receitas novas adicionadas ao banco!';
    UI.render();
    if (UI._toastInicial) { UI.toast('\u{1F4D6} ' + UI._toastInicial); UI._toastInicial = null; }
    // Proteção dos dados: pede ao navegador para NÃO despejar o IndexedDB
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
    // PWA: service worker (só http/https; em file:// falha silenciosamente)
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.onupdatefound = () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.onstatechange = () => {
            if (nw.state === 'activated' && navigator.serviceWorker.controller)
              UI.toast('App atualizado para a versão mais recente ✓');
          };
        };
      }).catch(() => {});
    }
    // wake lock cai quando a aba perde foco — readquire se ainda cozinhando
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && document.querySelector('.cozinhando')) {
        UI._wake = null; UI.ativarWakeLock();
      }
    });
  } catch (e) {
    document.getElementById('tela').innerHTML =
      `<div class="vazio" style="margin-top:30px"><b>Não foi possível abrir o banco local</b>
      Seu navegador bloqueou o IndexedDB (comum em aba anônima). Abra em uma aba normal e recarregue.</div>`;
    console.error(e);
  }
})();
</script>
