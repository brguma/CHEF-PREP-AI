<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1D3557">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121A29">
<meta name="color-scheme" content="light dark">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChefPrep">
<title>ChefPrep — Gestão da Cozinha</title>
<style>
/* ============ TOKENS — tema "esmaltado" ============ */
:root{
  --esmalte:#1D3557;        /* azul de caneca esmaltada */
  --esmalte-fundo:#16294A;
  --louca:#FAF7F0;          /* branco-louça quente */
  --card:#FFFFFF;
  --borda-rim:#C7402D;      /* vermelho da borda esmaltada */
  --salsa:#2E7D4F;          /* pode fazer agora */
  --salsa-suave:#E4F0E8;
  --mostarda:#C98A1B;       /* vencendo / quase lá */
  --mostarda-suave:#FBF1DC;
  --tinta:#2B2A26;
  --cinza:#877F70;
  --linha:#E6E0D2;
  --traco:#1D3557;          /* bordas de destaque (clareia no dark) */
  --raio:14px;
  --sombra:0 1px 3px rgba(29,53,87,.10),0 4px 14px rgba(29,53,87,.06);
  --fonte:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --louca:#121A29;         /* tom do ícone */
    --card:#1B2536;
    --tinta:#ECE7DB;
    --cinza:#98A1B3;
    --linha:#2E3B54;
    --esmalte:#22406E;
    --traco:#4A6EA8;
    --salsa-suave:#17362A;
    --mostarda-suave:#3A2E14;
    --sombra:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--fonte);background:var(--louca);color:var(--tinta);
  min-height:100dvh;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
:focus-visible{outline:3px solid var(--mostarda);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ CABEÇALHO ============ */
header{background:var(--esmalte);color:#fff;padding:14px 18px calc(14px);
  padding-top:calc(14px + env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:4px solid var(--borda-rim)}
.marca{display:flex;flex-direction:column;gap:1px}
.marca b{font-size:19px;font-weight:800;letter-spacing:-.02em}
.marca span{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;opacity:.75}
.btn-config{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  background:rgba(255,255,255,.12);font-size:18px}

/* ============ LAYOUT ============ */
main{max-width:680px;margin:0 auto;padding:16px 16px 32px}
.secao-rotulo{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.16em;color:var(--cinza);margin:22px 0 10px;
  display:flex;align-items:center;gap:10px}
.secao-rotulo::after{content:"";flex:1;height:1px;background:var(--linha)}
.vazio{border:2px dashed var(--linha);border-radius:var(--raio);padding:26px 18px;
  text-align:center;color:var(--cinza);font-size:14px;line-height:1.55}
.vazio b{color:var(--tinta);display:block;margin-bottom:4px;font-size:15px}

/* ============ CARDS "ESMALTADOS" (assinatura) ============ */
.card{background:var(--card);border:2px solid var(--traco);border-radius:var(--raio);
  box-shadow:inset 0 0 0 3px var(--card),inset 0 0 0 4px var(--linha),var(--sombra);
  padding:14px;margin-bottom:12px}
.card.pronta{border-color:var(--salsa)}
.card.quase{border-color:var(--mostarda)}
.card-topo{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.card h3{font-size:16.5px;font-weight:800;letter-spacing:-.01em;line-height:1.25}
.card .meta{font-size:12.5px;color:var(--cinza);margin-top:3px}
.badge{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  padding:4px 9px;border-radius:99px;white-space:nowrap}
.badge.ok{background:var(--salsa-suave);color:var(--salsa)}
.badge.um{background:var(--mostarda-suave);color:var(--mostarda)}
.badge.quase{background:#EEE9DD;color:var(--cinza)}
.badge.venc{background:#F8E3DF;color:var(--borda-rim)}

/* placar de ingredientes: bolinhas */
.placar{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.pt{width:11px;height:11px;border-radius:50%;border:2px solid var(--salsa)}
.pt.tem{background:var(--salsa)}
.pt.falta{border-color:var(--borda-rim);background:transparent}
.pt.opc{border-color:var(--linha);background:transparent}
.pt.bas{border-color:#5B84C4;background:#5B84C4}
.placar-legenda{font-size:12px;color:var(--cinza);margin-top:6px}
.placar-legenda b{color:var(--borda-rim);font-weight:700}

.card-acoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* ============ BOTÕES ============ */
.btn{padding:10px 16px;border-radius:10px;font-size:14px;font-weight:700;
  display:inline-flex;align-items:center;gap:7px;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn-primario{background:var(--esmalte);color:#fff}
.btn-verde{background:var(--salsa);color:#fff}
.btn-contorno{border:2px solid var(--linha);background:var(--card);color:var(--tinta)}
.btn-perigo{color:var(--borda-rim);border:2px solid #F0D5D0;background:#fff}
.btn-mini{padding:7px 12px;font-size:13px;border-radius:9px}
.btn-fav{font-size:20px;line-height:1;padding:4px}

/* ============ INÍCIO ============ */
.hero{background:var(--esmalte);color:#fff;border-radius:var(--raio);
  padding:20px 18px;margin-bottom:6px;border:2px solid var(--esmalte);
  box-shadow:inset 0 0 0 3px var(--esmalte),inset 0 0 0 4px rgba(255,255,255,.25)}
.hero .pergunta{font-size:13px;text-transform:uppercase;letter-spacing:.12em;opacity:.75}
.hero .numerao{font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:6px 0 2px}
.hero .resposta{font-size:14.5px;opacity:.92}
.alerta-validade{background:var(--mostarda-suave);border:2px solid var(--mostarda);
  border-radius:12px;padding:12px 14px;font-size:13.5px;margin:12px 0;line-height:1.5}
.alerta-validade b{color:var(--mostarda)}
.atalhos{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.atalho{background:var(--card);border:2px solid var(--linha);border-radius:12px;
  padding:14px 12px;text-align:left;font-size:13.5px;font-weight:700;line-height:1.3}
.atalho span{display:block;font-size:20px;margin-bottom:6px}

/* ============ BUSCA E FILTROS ============ */
.barra-busca{display:flex;gap:8px;margin-bottom:12px}
.barra-busca input{flex:1;padding:12px 14px;border:2px solid var(--linha);
  border-radius:12px;background:var(--card)}
.barra-busca input:focus{border-color:var(--esmalte);outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;
  -webkit-overflow-scrolling:touch}
.chip{padding:7px 13px;border-radius:99px;border:2px solid var(--linha);
  background:var(--card);font-size:13px;font-weight:600;white-space:nowrap;color:var(--cinza)}
.chip.ativo{background:var(--esmalte);border-color:var(--esmalte);color:#fff}

/* ============ ESTOQUE ============ */
.abas-local{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.aba-local{padding:9px 4px;border-radius:10px;border:2px solid var(--linha);
  background:var(--card);font-size:12.5px;font-weight:700;color:var(--cinza);text-align:center}
.aba-local.ativo{background:var(--esmalte);border-color:var(--esmalte);color:#fff}
.item-estoque{display:flex;align-items:center;gap:12px;background:var(--card);
  border:2px solid var(--linha);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.item-estoque.vencendo{border-color:var(--mostarda)}
.item-estoque.vencido{border-color:var(--borda-rim)}
.item-info{flex:1;min-width:0}
.item-info b{font-size:14.5px;display:block}
.item-info small{font-size:12px;color:var(--cinza)}
.item-qtd{display:flex;align-items:center;gap:6px}
.stepper{width:30px;height:30px;border-radius:8px;border:2px solid var(--linha);
  font-size:16px;font-weight:800;display:grid;place-items:center;background:var(--card)}
.item-qtd .valor{min-width:52px;text-align:center;font-weight:700;font-size:14px}

/* ============ PLANO SEMANAL ============ */
.dia-plano{background:var(--card);border:2px solid var(--linha);border-radius:12px;
  padding:12px 14px;margin-bottom:10px}
.dia-plano.hoje{border-color:var(--traco)}
.dia-plano h4{font-size:13px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--cinza);margin-bottom:8px;display:flex;justify-content:space-between}
.dia-plano h4 .hoje-tag{color:var(--esmalte)}
.refeicao{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:14px;
  border-top:1px dashed var(--linha)}
.refeicao:first-of-type{border-top:none}
.refeicao .rotulo-ref{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--cinza);width:64px;flex-shrink:0}
.refeicao .nome-rec{flex:1;font-weight:600}
.refeicao .vago{flex:1;color:var(--cinza);font-style:italic;font-size:13px}
.macro-dia{font-size:12px;color:var(--cinza);margin-top:8px;padding-top:8px;
  border-top:1px dashed var(--linha)}

/* ============ LISTA DE COMPRAS ============ */
.item-lista{display:flex;align-items:center;gap:12px;background:var(--card);
  border:2px solid var(--linha);border-radius:12px;padding:12px 13px;margin-bottom:8px}
.item-lista.comprado{opacity:.5}
.item-lista.comprado .nome{text-decoration:line-through}
.check{width:26px;height:26px;border-radius:8px;border:2px solid var(--traco);
  display:grid;place-items:center;font-size:15px;color:#fff;flex-shrink:0;background:var(--card)}
.item-lista.comprado .check{background:var(--salsa);border-color:var(--salsa)}
.item-lista .nome{flex:1;font-size:14.5px;font-weight:600}
.item-lista small{color:var(--cinza);font-size:12px}

/* ============ NAV INFERIOR ============ */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:2px solid var(--linha);display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom);z-index:50}
.nav-item{padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;
  gap:2px;font-size:10.5px;font-weight:700;color:var(--cinza);
  text-transform:uppercase;letter-spacing:.05em}
.nav-item span{font-size:20px}
.nav-item.ativo{color:var(--traco)}
.nav-item.ativo::before{content:"";position:absolute;top:0;width:36px;height:3px;
  background:var(--borda-rim);border-radius:0 0 3px 3px}
.nav-item{position:relative}

/* ============ OVERLAYS / MODAIS ============ */
.overlay{position:fixed;inset:0;background:rgba(29,42,63,.55);z-index:100;
  display:flex;align-items:flex-end;justify-content:center}
.folha{background:var(--louca);width:100%;max-width:680px;max-height:92dvh;
  border-radius:20px 20px 0 0;overflow-y:auto;padding:18px 18px 34px;
  animation:sobe .22s ease-out}
@keyframes sobe{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.folha-topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.folha-topo h2{font-size:19px;font-weight:800;letter-spacing:-.01em}
.btn-fechar{width:36px;height:36px;border-radius:50%;background:var(--linha);
  font-size:16px;display:grid;place-items:center}

/* ============ FORMULÁRIOS ============ */
.campo{margin-bottom:14px}
.campo label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--cinza);margin-bottom:6px}
.campo input,.campo select,.campo textarea{width:100%;padding:11px 13px;
  border:2px solid var(--linha);border-radius:10px;background:var(--card)}
.campo textarea{min-height:90px;resize:vertical}
.campo input:focus,.campo select:focus,.campo textarea:focus{border-color:var(--esmalte);outline:none}
.linha-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.linha-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
.dica{font-size:12px;color:var(--cinza);margin-top:5px;line-height:1.4}

/* ============ DETALHE DA RECEITA ============ */
.det-cab h2{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.det-meta{display:flex;gap:14px;font-size:13px;color:var(--cinza);margin:8px 0 4px;flex-wrap:wrap}
.porcoes-ctl{display:flex;align-items:center;gap:12px;background:var(--card);
  border:2px solid var(--linha);border-radius:12px;padding:10px 14px;margin:14px 0}
.porcoes-ctl .rotulo{flex:1;font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--cinza)}
.porcoes-ctl .num{font-size:18px;font-weight:800;min-width:28px;text-align:center}
.ing-linha{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px dashed var(--linha);font-size:14.5px}
.ing-linha .pt{flex-shrink:0}
.ing-linha .qtd-ing{color:var(--cinza);font-size:13px;margin-left:auto;white-space:nowrap}
.ing-linha.sem{color:var(--borda-rim)}
.ing-linha.sem .qtd-ing{color:var(--borda-rim)}
.passo{display:flex;gap:12px;padding:11px 0;border-bottom:1px dashed var(--linha);
  font-size:14.5px;line-height:1.55}
.passo .n{width:26px;height:26px;border-radius:50%;background:var(--esmalte);color:#fff;
  font-size:13px;font-weight:800;display:grid;place-items:center;flex-shrink:0}

/* ============ MODO COZINHANDO ============ */
.cozinhando{position:fixed;inset:0;background:var(--esmalte);color:#fff;z-index:200;
  display:flex;flex-direction:column;padding:calc(18px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom))}
.coz-topo{display:flex;justify-content:space-between;align-items:center;font-size:13px;
  text-transform:uppercase;letter-spacing:.12em;opacity:.85}
.coz-progresso{display:flex;gap:5px;margin:16px 0}
.coz-progresso i{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.25)}
.coz-progresso i.feito{background:var(--mostarda)}
.coz-corpo{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.coz-num{font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--mostarda);font-weight:800}
.coz-texto{font-size:23px;font-weight:700;line-height:1.45;letter-spacing:-.01em}
.coz-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.coz-nav .btn{justify-content:center;padding:15px;font-size:15px}
.coz-nav .btn-volta{background:rgba(255,255,255,.14);color:#fff}
.coz-nav .btn-avanca{background:var(--mostarda);color:var(--esmalte-fundo)}
.coz-timer{background:rgba(255,255,255,.16);color:#fff;padding:7px 13px;border-radius:99px;
  font-size:13px;font-weight:800;letter-spacing:.02em}
.coz-timer.fim{background:var(--borda-rim);animation:pulsa 1s infinite}
@keyframes pulsa{50%{opacity:.6}}
.btn-timer{margin-top:4px;background:rgba(255,255,255,.16);color:#fff;padding:10px 15px;
  border-radius:10px;font-size:14px;font-weight:700;align-self:flex-start}

/* ============ CONFIG ============ */
.perfil-opcoes{display:grid;gap:9px;margin-bottom:6px}
.perfil-op{display:flex;gap:12px;align-items:flex-start;background:var(--card);
  border:2px solid var(--linha);border-radius:12px;padding:13px 14px;text-align:left}
.perfil-op.ativo{border-color:var(--traco)}
.perfil-op b{display:block;font-size:14.5px}
.perfil-op small{font-size:12.5px;color:var(--cinza);line-height:1.45}
.perfil-op .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--linha);
  flex-shrink:0;margin-top:2px}
.perfil-op.ativo .radio{border-color:var(--traco);background:var(--traco);
  box-shadow:inset 0 0 0 4px var(--card)}

/* toast */
.toast{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%);background:var(--tinta);color:var(--louca);padding:11px 18px;
  border-radius:99px;font-size:13.5px;font-weight:600;z-index:300;white-space:nowrap;
  animation:sobe .2s ease-out;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.com-acao{display:flex;align-items:center;gap:6px;padding-right:8px}
.toast .toast-msg{overflow:hidden;text-overflow:ellipsis}
.toast .toast-desfazer{background:none;border:0;color:#FFC864;font:inherit;font-weight:800;
  padding:6px 12px;border-radius:99px;cursor:pointer;flex:none}
.toast .toast-desfazer:active{background:rgba(255,255,255,.12)}

.escondido{display:none!important}
@media(min-width:700px){
  .atalhos{grid-template-columns:repeat(4,1fr)}
  .folha{border-radius:20px;margin-bottom:4vh;max-height:88dvh}
  .overlay{align-items:center}
}
</style>
</head>
<body>
<header>
  <div class="marca">
    <b>ChefPrep</b>
    <span>Gestão da cozinha</span>
  </div>
  <button class="btn-config" onclick="UI.abrirConfig()" aria-label="Configurações">⚙️</button>
</header>

<main id="tela"></main>

<nav aria-label="Navegação principal">
  <button class="nav-item ativo" data-tab="inicio" onclick="UI.ir('inicio')"><span>🏠</span>Início</button>
  <button class="nav-item" data-tab="receitas" onclick="UI.ir('receitas')"><span>📖</span>Receitas</button>
  <button class="nav-item" data-tab="estoque" onclick="UI.ir('estoque')"><span>🧊</span>Estoque</button>
  <button class="nav-item" data-tab="plano" onclick="UI.ir('plano')"><span>📅</span>Plano</button>
  <button class="nav-item" data-tab="lista" onclick="UI.ir('lista')"><span>🛒</span>Lista</button>
</nav>

<div id="overlays"></div>

<script>
/* =====================================================================
   ChefPrep v1.0 — Sistema Inteligente de Gestão da Cozinha Doméstica
   Offline-first · Zero dependências · IndexedDB
   Arquitetura: camada de dados → engines determinísticos → UI
   Costuras para v2 (IA): SuggestionProvider · schema RecipeImporter
   ===================================================================== */

/* ============ UTILS ============ */
const U = {
  id: () => (crypto && crypto.randomUUID) ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
  norm(s) { // normalização canônica de nomes de ingredientes
    return (s || '').toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ');
  },
  esc(s) {
    return (s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  },
  isoLocal(d) { // data local (toISOString é UTC e erra o dia à noite no Brasil)
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')
      + '-' + String(d.getDate()).padStart(2, '0');
  },
  hojeISO() { return U.isoLocal(new Date()); },
  diasAte(iso) {
    if (!iso) return null;
    const d = new Date(iso + 'T12:00:00') - new Date(U.hojeISO() + 'T12:00:00');
    return Math.round(d / 86400000);
  },
  fmtQtd(n) {
    if (n == null || isNaN(n)) return '';
    return (Math.round(n * 100) / 100).toString().replace('.', ',');
  },
  diaSemana: ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado']
};

/* ============ SINÔNIMOS PT-BR (busca "inteligente" determinística) ============ */
const SINONIMOS = {
  'macaxeira': 'mandioca', 'aipim': 'mandioca',
  'jerimum': 'abobora', 'moranga': 'abobora',

}

/* ============ CAMADA DE DADOS — IndexedDB ============ */
const DB = (() => {
  const NOME = 'chefprep', VERSAO = 1;
  const STORES = ['receitas', 'estoque', 'plano', 'lista', 'config'];
  let db = null;

  function abrir() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(NOME, VERSAO);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        STORES.forEach(s => {
          if (!d.objectStoreNames.contains(s)) d.createObjectStore(s, { keyPath: 'id' });
        });
      };
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror = () => rej(req.error);
    });
  }
  function tx(store, modo, fn) {
    return new Promise((res, rej) => {
      const t = db.transaction(store, modo);
      const r = fn(t.objectStore(store));
      t.oncomplete = () => res(r && r._pronto ? r._resultado : true);
      t.onerror = () => rej(t.error);
      if (r && 'onsuccess' in r) {
        r.onsuccess = () => { r._pronto = true; r._resultado = r.result; };
      }
    });
  }
  return {
    abrir,
    todos: (s) => tx(s, 'readonly', os => os.getAll()),
    pegar: (s, id) => tx(s, 'readonly', os => os.get(id)),
    salvar: (s, obj) => tx(s, 'readwrite', os => os.put(obj)),
    remover: (s, id) => tx(s, 'readwrite', os => os.delete(id)),
    limpar: (s) => tx(s, 'readwrite', os => os.clear())
  };
})();

{"nome":"Salada de tomate cereja com manjericão","categoria":"Salada","tags":["fresca","italiana","vegano"],"tempoMin":8,"porcoesBase":4,"ingredientes":[{"nome":"tomate","qtd":20,"unidade":"un","critico":true},{"nome":"manjericao","qtd":10,"unidade":"folha","critico":true},{"nome":"alho","qtd":1,"unidade":"dente"},{"nome":"azeite","qtd":3,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Corte os tomatinhos ao meio e salgue; deixe 5 min soltando suco.","Junte alho bem picado, azeite e o manjericão rasgado.","Sirva com pão para molhar no caldinho do fundo — é a melhor parte."],"equipamentos":[],"nutri":{"kcal":100,"prot":2,"carb":7,"gord":8}},
{"nome":"Salada de batata com maionese e ervas","categoria":"Salada","tags":["cremosa","churrasco"],"tempoMin":30,"porcoesBase":6,"ingredientes":[{"nome":"batata","qtd":5,"unidade":"un","critico":true},{"nome":"maionese","qtd":4,"unidade":"col sopa","critico":true},{"nome":"mostarda","qtd":1,"unidade":"col chá"},{"nome":"cebolinha","qtd":3,"unidade":"col sopa"},{"nome":"vinagre","qtd":1,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Cozinhe as batatas em cubos por 12 min — macias mas firmes; escorra.","Ainda mornas, regue com vinagre e sal — elas absorvem melhor o tempero.","Depois de frias, envolva na maionese com mostarda e cebolinha.","Gele por 30 min antes de servir."],"equipamentos":["panela"],"nutri":{"kcal":210,"prot":3,"carb":32,"gord":8}},
{"nome":"Salada de folhas com tomate seco","categoria":"Salada","tags":["sofisticada","rápida"],"tempoMin":8,"porcoesBase":4,"ingredientes":[{"nome":"rucula","qtd":1,"unidade":"maço","critico":true},{"nome":"tomate seco","qtd":0.5,"unidade":"xíc","critico":true},{"nome":"queijo mussarela","qtd":100,"unidade":"g","opcional":true},{"nome":"azeite","qtd":2,"unidade":"col sopa"},{"nome":"vinagre","qtd":1,"unidade":"col sopa"}],"passos":["Monte a rúcula com os tomates secos em tiras.","Junte bolinhas ou cubos de mussarela.","Regue com azeite, vinagre e pimenta-do-reino — o tomate seco já leva sal."],"equipamentos":[],"nutri":{"kcal":160,"prot":6,"carb":6,"gord":12}},
{"nome":"Salada de quinoa com manga e hortelã","categoria":"Salada","tags":["grãos","tropical","vegano"],"tempoMin":25,"porcoesBase":4,"ingredientes":[{"nome":"quinoa","qtd":1,"unidade":"xíc","critico":true},{"nome":"manga","qtd":1,"unidade":"un","critico":true},{"nome":"pepino","qtd":1,"unidade":"un"},{"nome":"hortela","qtd":2,"unidade":"col sopa"},{"nome":"limao","qtd":1,"unidade":"un"},{"nome":"azeite","qtd":2,"unidade":"col sopa"}],"passos":["Cozinhe a quinoa lavada em 2 xícaras de água por 15 min; solte com garfo e esfrie.","Corte manga e pepino em cubinhos.","Misture tudo com limão, azeite, hortelã e sal.","Fresca, doce e completa — boa de marmita."],"equipamentos":["panela"],"nutri":{"kcal":220,"prot":6,"carb":34,"gord":8}},
{"nome":"Salada de couve-flor crua com iogurte","categoria":"Salada","tags":["low carb","crocante"],"tempoMin":12,"porcoesBase":4,"ingredientes":[{"nome":"couve-flor","qtd":0.5,"unidade":"un","critico":true},{"nome":"iogurte","qtd":1,"unidade":"xíc","critico":true},{"nome":"limao","qtd":0.5,"unidade":"un"},{"nome":"alho","qtd":1,"unidade":"dente"},{"nome":"salsinha","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Separe a couve-flor crua em mini-floretes bem pequenos.","Molho: iogurte, limão, alho amassado, salsinha e sal.","Envolva os floretes no molho e gele por 15 min.","Crocante e leve — acompanha assados pesados."],"equipamentos":[],"nutri":{"kcal":70,"prot":4,"carb":8,"gord":2}},
{"nome":"Salada completa de pote (marmita)","categoria":"Salada","tags":["marmita","semana","proteica"],"tempoMin":25,"porcoesBase":4,"ingredientes":[{"nome":"alface","qtd":0.5,"unidade":"un","critico":true},{"nome":"frango","qtd":300,"unidade":"g","critico":true},{"nome":"grao-de-bico","qtd":1,"unidade":"xíc"},{"nome":"cenoura","qtd":1,"unidade":"un"},{"nome":"tomate","qtd":2,"unidade":"un"},{"nome":"azeite","qtd":2,"unidade":"col sopa"},{"nome":"limao","qtd":1,"unidade":"un"}],"passos":["No fundo do pote vai o molho: azeite, limão e sal.","Camadas de baixo para cima: grão-de-bico, cenoura ralada, tomate, frango desfiado.","As folhas SEMPRE por último, no topo, longe do molho.","Na hora de comer, vire o pote no prato. Dura 3 dias na geladeira."],"equipamentos":[],"nutri":{"kcal":280,"prot":26,"carb":20,"gord":10}},
{"nome":"Chucrute caseiro","categoria":"Conserva","tags":["fermentado","probiótico","vegano"],"tempoMin":30,"porcoesBase":12,"ingredientes":[{"nome":"repolho","qtd":1,"unidade":"un","critico":true},{"nome":"sal","qtd":1.5,"unidade":"col sopa","critico":true}],"passos":["Fatie o repolho bem fino e pese: use 2% de sal sobre o peso (1,5 col sopa para 1 repolho médio).","Massageie com o sal por 10 min até soltar bastante líquido.","Soque num vidro limpo até o líquido cobrir tudo; deixe 3 dedos de folga no topo.","Tampe frouxo e fermente fora da geladeira por 7 dias, apertando 1 vez ao dia para manter submerso. Depois, geladeira — dura meses."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":15,"prot":1,"carb":3,"gord":0}},
{"nome":"Kimchi simplificado","categoria":"Conserva","tags":["fermentado","picante","coreano"],"tempoMin":45,"porcoesBase":12,"ingredientes":[{"nome":"acelga","qtd":1,"unidade":"un","critico":true},{"nome":"sal","qtd":3,"unidade":"col sopa"},{"nome":"pimenta calabresa","qtd":2,"unidade":"col sopa","critico":true},{"nome":"alho","qtd":4,"unidade":"dente"},{"nome":"gengibre","qtd":1,"unidade":"col sopa"},{"nome":"acucar","qtd":1,"unidade":"col chá"},{"nome":"cebolinha","qtd":4,"unidade":"col sopa"}],"passos":["Corte a acelga em pedaços grandes, salgue e deixe 30 min; lave e esprema bem.","Pasta: alho, gengibre, pimenta calabresa, açúcar e um pouco de água.","Esfregue a pasta na acelga com a cebolinha (use luvas).","Soque num vidro, deixe fermentar 3 dias fora da geladeira e depois refrigere. Dura semanas e fica melhor com o tempo."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":25,"prot":1,"carb":4,"gord":0}},
{"nome":"Conserva de pimenta biquinho","categoria":"Conserva","tags":["conserva","petisco","vegano"],"tempoMin":20,"porcoesBase":15,"ingredientes":[{"nome":"pimenta biquinho","qtd":300,"unidade":"g","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"},{"nome":"louro","qtd":1,"unidade":"folha"}],"passos":["Lave as pimentas e fure cada uma com um palito para o líquido entrar.","Ferva vinagre, 1 xícara de água, açúcar, sal e louro por 3 min.","Coloque as pimentas num vidro esterilizado e cubra com o líquido quente.","Feche e espere 5 dias antes de comer. Dura 2 meses na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":12,"prot":0,"carb":3,"gord":0}},
{"nome":"Picles de pepino com endro","categoria":"Conserva","tags":["conserva","clássico","vegano"],"tempoMin":20,"porcoesBase":10,"ingredientes":[{"nome":"pepino","qtd":4,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"endro","qtd":2,"unidade":"ramo"},{"nome":"alho","qtd":3,"unidade":"dente"},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"pimenta-do-reino","qtd":1,"unidade":"col chá"}],"passos":["Corte os pepinos em espetos compridos e acomode em pé num vidro com o endro e o alho.","Ferva vinagre, 1 xícara de água, açúcar, sal e pimenta em grãos por 2 min.","Despeje quente sobre os pepinos até cobrir.","Geladeira por 48h antes de abrir — é o picles de hambúrguer de verdade. Dura 1 mês."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":15,"prot":0,"carb":3,"gord":0}},
{"nome":"Conserva de couve-flor","categoria":"Conserva","tags":["conserva","crocante","vegano"],"tempoMin":25,"porcoesBase":10,"ingredientes":[{"nome":"couve-flor","qtd":1,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1.5,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"louro","qtd":1,"unidade":"folha"},{"nome":"pimenta calabresa","qtd":1,"unidade":"col chá","opcional":true}],"passos":["Separe em floretes pequenos e escalde por 2 min em água fervente; escorra.","Ferva vinagre, 1,5 xícara de água, açúcar, sal e louro por 3 min.","Acomode a couve-flor no vidro e cubra com o líquido quente.","Espere 3 dias. Crocante e ácida — vai bem em tábuas e sanduíches. Dura 1 mês na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":20,"prot":1,"carb":4,"gord":0}},
{"nome":"Conserva de vagem","categoria":"Conserva","tags":["conserva","crocante","vegano"],"tempoMin":20,"porcoesBase":10,"ingredientes":[{"nome":"vagem","qtd":400,"unidade":"g","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"pimenta-do-reino","qtd":1,"unidade":"col chá"}],"passos":["Apare as pontas das vagens e escalde por 2 min; choque em água gelada.","Ferva vinagre, 1 xícara de água, sal, açúcar e pimenta por 2 min.","Acomode as vagens em pé no vidro com o alho e cubra com o líquido quente.","Espere 3 dias. Dura 1 mês na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":18,"prot":1,"carb":4,"gord":0}},
{"nome":"Conserva de abobrinha","categoria":"Conserva","tags":["conserva","agridoce","vegano"],"tempoMin":25,"porcoesBase":10,"ingredientes":[{"nome":"abobrinha","qtd":2,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"acucar","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"oregano","qtd":1,"unidade":"col chá"}],"passos":["Fatie abobrinha e cebola em rodelas finas, salgue e deixe 15 min; esprema.","Ferva vinagre, meia xícara de água, açúcar e orégano por 2 min.","Acomode no vidro e cubra com o líquido quente.","Pronta em 24h. Dura 3 semanas na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":20,"prot":1,"carb":4,"gord":0}},
{"nome":"Conserva de quiabo","categoria":"Conserva","tags":["conserva","crocante","vegano"],"tempoMin":20,"porcoesBase":10,"ingredientes":[{"nome":"quiabo","qtd":300,"unidade":"g","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"pimenta calabresa","qtd":1,"unidade":"col chá"},{"nome":"acucar","qtd":1,"unidade":"col sopa"}],"passos":["Lave e seque MUITO bem os quiabos; apare só o cabinho sem abrir (segredo anti-baba).","Ferva vinagre, 1 xícara de água, sal, açúcar e pimenta por 2 min.","Acomode os quiabos inteiros em pé no vidro com o alho e cubra com o líquido quente.","Espere 4 dias — crocante, sem baba nenhuma. Dura 1 mês na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":18,"prot":1,"carb":4,"gord":0}},
{"nome":"Conserva de beterraba","categoria":"Conserva","tags":["conserva","agridoce","vegano"],"tempoMin":40,"porcoesBase":10,"ingredientes":[{"nome":"beterraba","qtd":3,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"},{"nome":"cravo","qtd":3,"unidade":"un","opcional":true}],"passos":["Cozinhe as beterrabas com casca por 30 min; descasque e corte em rodelas.","Ferva vinagre, meia xícara de água, açúcar, sal e cravo por 2 min.","Acomode as rodelas no vidro e cubra com o líquido quente.","Pronta em 24h. Dura 1 mês — ótima picada em saladas e sanduíches."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":30,"prot":1,"carb":7,"gord":0}},
{"nome":"Conserva de chuchu","categoria":"Conserva","tags":["conserva","crocante","vegano"],"tempoMin":20,"porcoesBase":10,"ingredientes":[{"nome":"chuchu","qtd":2,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"pimenta dedo de moca","qtd":1,"unidade":"un","opcional":true},{"nome":"louro","qtd":1,"unidade":"folha"}],"passos":["Descasque os chuchus e corte em palitos; escalde 1 min e escorra.","Ferva vinagre, 1 xícara de água, sal, açúcar e louro por 2 min.","Acomode os palitos no vidro com a pimenta em rodelas e cubra com o líquido quente.","Espere 2 dias. O chuchu vira petisco crocante que ninguém identifica. Dura 1 mês."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":15,"prot":0,"carb":3,"gord":0}},
{"nome":"Giardiniera (conserva mista de legumes)","categoria":"Conserva","tags":["conserva","italiana","vegano"],"tempoMin":30,"porcoesBase":15,"ingredientes":[{"nome":"couve-flor","qtd":0.5,"unidade":"un","critico":true},{"nome":"cenoura","qtd":2,"unidade":"un","critico":true},{"nome":"pimentao","qtd":1,"unidade":"un"},{"nome":"vagem","qtd":150,"unidade":"g"},{"nome":"vinagre","qtd":2,"unidade":"xíc"},{"nome":"acucar","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"oregano","qtd":1,"unidade":"col chá"}],"passos":["Corte todos os legumes em pedaços de boca e escalde por 2 min; escorra.","Ferva vinagre, 2 xícaras de água, açúcar, sal e orégano por 3 min.","Distribua os legumes coloridos no vidro e cubra com o líquido quente.","Espere 3 dias. É a conserva de tábua de frios italiana. Dura 1 mês na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":22,"prot":1,"carb":5,"gord":0}},
{"nome":"Conserva de maxixe","categoria":"Conserva","tags":["conserva","nordestina","vegano"],"tempoMin":20,"porcoesBase":10,"ingredientes":[{"nome":"maxixe","qtd":300,"unidade":"g","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"coentro","qtd":1,"unidade":"col sopa","opcional":true}],"passos":["Raspe os espinhos do maxixe e deixe inteiros (ou ao meio se grandes).","Ferva vinagre, 1 xícara de água e sal por 2 min.","Acomode no vidro com alho e cubra com o líquido quente.","Espere 3 dias. Crocante e diferente — dura 3 semanas na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":14,"prot":0,"carb":3,"gord":0}},
{"nome":"Conserva de nabo estilo japonês","categoria":"Conserva","tags":["oriental","agridoce","vegano"],"tempoMin":15,"porcoesBase":10,"ingredientes":[{"nome":"nabo","qtd":1,"unidade":"un","critico":true},{"nome":"vinagre","qtd":0.5,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":3,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Corte o nabo em meias-luas finas, salgue e deixe 15 min; esprema bem.","Misture vinagre e açúcar até dissolver (sem ferver).","Envolva o nabo e guarde no vidro apertando para o líquido cobrir.","Pronto em 24h — o tsukemono do restaurante japonês. Dura 2 semanas."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":18,"prot":0,"carb":4,"gord":0}},
{"nome":"Gengibre em conserva (gari)","categoria":"Conserva","tags":["oriental","agridoce","vegano"],"tempoMin":25,"porcoesBase":15,"ingredientes":[{"nome":"gengibre","qtd":200,"unidade":"g","critico":true},{"nome":"vinagre","qtd":0.75,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":4,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Descasque o gengibre e fatie o mais fino que conseguir (descascador ajuda).","Escalde as fatias por 2 min para tirar a agressividade; escorra.","Ferva vinagre, açúcar e sal só até dissolver e despeje sobre o gengibre no vidro.","Pronto em 2 dias — o rosado natural aparece em gengibre novinho. Dura 2 meses."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":15,"prot":0,"carb":4,"gord":0}},
{"nome":"Limão em conserva marroquino","categoria":"Conserva","tags":["fermentado","tempero","vegano"],"tempoMin":15,"porcoesBase":20,"ingredientes":[{"nome":"limao","qtd":6,"unidade":"un","critico":true},{"nome":"sal","qtd":6,"unidade":"col sopa","critico":true},{"nome":"louro","qtd":1,"unidade":"folha","opcional":true}],"passos":["Corte os limões em cruz sem separar os quartos e recheie cada um com 1 col sopa de sal.","Soque num vidro apertando bem para soltar o suco; o líquido deve cobrir.","Complete com suco de limão extra se precisar e feche.","Espere 3 semanas fora da geladeira. Use a casca picada em ensopados, frango e saladas — dura 6 meses refrigerado."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":8,"prot":0,"carb":2,"gord":0}},
{"nome":"Casca de melancia em conserva","categoria":"Conserva","tags":["aproveitamento","agridoce","vegano"],"tempoMin":30,"porcoesBase":10,"ingredientes":[{"nome":"melancia","qtd":4,"unidade":"xíc","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc","critico":true},{"nome":"acucar","qtd":0.5,"unidade":"xíc"},{"nome":"cravo","qtd":4,"unidade":"un"},{"nome":"canela","qtd":1,"unidade":"un"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Use a parte branca da casca: descarte o verde de fora e corte em cubos (4 xícaras).","Cozinhe os cubos em água por 10 min até ficarem translúcidos; escorra.","Ferva vinagre, açúcar, cravo, canela em pau e sal por 3 min e junte os cubos por mais 5 min.","Guarde no vidro com o líquido. Aproveitamento total — doce, ácida e crocante. Dura 1 mês."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":35,"prot":0,"carb":9,"gord":0}},
{"nome":"Ovos em conserva de vinagre","categoria":"Conserva","tags":["proteico","petisco"],"tempoMin":25,"porcoesBase":8,"ingredientes":[{"nome":"ovo","qtd":8,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1.5,"unidade":"xíc","critico":true},{"nome":"sal","qtd":1,"unidade":"col sopa"},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"louro","qtd":1,"unidade":"folha"},{"nome":"pimenta-do-reino","qtd":1,"unidade":"col chá"}],"passos":["Cozinhe os ovos por 10 min, esfrie em água gelada e descasque.","Ferva vinagre, meia xícara de água, sal, açúcar, louro e pimenta por 2 min.","Acomode os ovos no vidro e cubra com o líquido quente.","Espere 3 dias. Petisco de boteco raiz — dura 3 semanas na geladeira."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":80,"prot":6,"carb":1,"gord":5}},
{"nome":"Ovos rosa com beterraba","categoria":"Conserva","tags":["proteico","colorido"],"tempoMin":30,"porcoesBase":8,"ingredientes":[{"nome":"ovo","qtd":8,"unidade":"un","critico":true},{"nome":"beterraba","qtd":1,"unidade":"un","critico":true},{"nome":"vinagre","qtd":1,"unidade":"xíc"},{"nome":"acucar","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Cozinhe os ovos por 10 min e descasque; cozinhe a beterraba em rodelas por 15 min.","Ferva o caldo roxo da beterraba com vinagre, açúcar e sal por 2 min.","Coloque ovos e rodelas de beterraba no vidro e cubra com o líquido.","Em 2 dias os ovos ficam rosa-pink até o meio — lindos em saladas. Dura 2 semanas."],"equipamentos":["vidro com tampa","panela"],"nutri":{"kcal":85,"prot":6,"carb":3,"gord":5}},

{"nome":"Vinagre aromatizado com ervas","categoria":"Conserva","tags":["tempero","despensa","vegano"],"tempoMin":10,"porcoesBase":20,"ingredientes":[{"nome":"vinagre","qtd":2,"unidade":"xíc","critico":true},{"nome":"alecrim","qtd":2,"unidade":"ramo","critico":true},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"pimenta-do-reino","qtd":1,"unidade":"col chá"},{"nome":"louro","qtd":1,"unidade":"folha"}],"passos":["Aqueça o vinagre sem ferver (só até soltar vapor).","Coloque as ervas lavadas e bem secas, o alho e as especiarias numa garrafa limpa.","Despeje o vinagre morno e feche.","Espere 1 semana e coe. Transforma saladas — dura 3 meses no armário."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":5,"prot":0,"carb":1,"gord":0}},
{"nome":"Azeite de ervas secas","categoria":"Conserva","tags":["tempero","despensa","vegano"],"tempoMin":10,"porcoesBase":20,"ingredientes":[{"nome":"azeite","qtd":1,"unidade":"xíc","critico":true},{"nome":"oregano","qtd":1,"unidade":"col sopa","critico":true},{"nome":"pimenta calabresa","qtd":1,"unidade":"col chá"},{"nome":"alecrim","qtd":1,"unidade":"col chá"}],"passos":["Use apenas ervas SECAS — ervas frescas ou alho cru em azeite são risco de contaminação.","Aqueça o azeite a fogo baixíssimo por 3 min com as ervas, sem fritar.","Deixe esfriar na panela para infusionar e engarrafe.","Guarde na geladeira e use em 2 semanas: finaliza pizzas, pães e massas."],"equipamentos":["panela","vidro com tampa"],"nutri":{"kcal":110,"prot":0,"carb":0,"gord":12}},
{"nome":"Tomate pelado caseiro de pote","categoria":"Conserva","tags":["batch","despensa","vegano"],"tempoMin":30,"porcoesBase":12,"ingredientes":[{"nome":"tomate","qtd":12,"unidade":"un","critico":true},{"nome":"sal","qtd":1,"unidade":"col chá","critico":true},{"nome":"manjericao","qtd":4,"unidade":"folha","opcional":true}],"passos":["Faça um corte em X na base dos tomates e mergulhe em água fervente por 1 min.","Choque em água gelada — a pele sai inteira na mão.","Aperte os tomates pelados em vidros com sal e manjericão, cobrindo com o próprio suco.","Geladeira por 1 semana ou freezer por 3 meses: base pronta para qualquer molho."],"equipamentos":["panela","vidro com tampa"],"nutri":{"kcal":20,"prot":1,"carb":4,"gord":0}},
{"nome":"Curtido de repolho (estilo taqueria)","categoria":"Conserva","tags":["mexicano","picante","vegano"],"tempoMin":15,"porcoesBase":10,"ingredientes":[{"nome":"repolho","qtd":0.5,"unidade":"un","critico":true},{"nome":"cenoura","qtd":1,"unidade":"un"},{"nome":"vinagre","qtd":0.75,"unidade":"xíc","critico":true},{"nome":"oregano","qtd":1,"unidade":"col chá"},{"nome":"pimenta dedo de moca","qtd":1,"unidade":"un"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Fatie repolho e cenoura bem finos e a pimenta em rodelas.","Massageie com o sal por 2 min.","Cubra com o vinagre misturado a meia xícara de água e o orégano.","Pronto em 12h — o curtido de taco e tortas. Dura 3 semanas na geladeira."],"equipamentos":["vidro com tampa"],"nutri":{"kcal":18,"prot":1,"carb":4,"gord":0}},
{"nome":"Compota de abacaxi em calda","categoria":"Conserva","tags":["doce","compoteira","vegano"],"tempoMin":40,"porcoesBase":10,"ingredientes":[{"nome":"abacaxi","qtd":1,"unidade":"un","critico":true},{"nome":"acucar","qtd":1,"unidade":"xíc","critico":true},{"nome":"cravo","qtd":4,"unidade":"un"},{"nome":"canela","qtd":1,"unidade":"un"}],"passos":["Corte o abacaxi em fatias ou meias-luas grossas.","Ferva 2 xícaras de água com açúcar, cravo e canela por 5 min.","Junte o abacaxi e cozinhe em fogo baixo por 25 min até a calda encorpar.","Guarde no vidro com a calda — sirva gelada com queijo. Dura 3 semanas na geladeira."],"equipamentos":["panela","vidro com tampa"],"nutri":{"kcal":95,"prot":0,"carb":24,"gord":0}},
{"nome":"Cebola crispy de pote","categoria":"Conserva","tags":["crocante","despensa","vegano"],"tempoMin":30,"porcoesBase":15,"ingredientes":[{"nome":"cebola","qtd":4,"unidade":"un","critico":true},{"nome":"farinha de trigo","qtd":3,"unidade":"col sopa"},{"nome":"oleo","qtd":1,"unidade":"xíc","critico":true},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Fatie as cebolas em meias-luas bem finas e polvilhe a farinha, soltando com as mãos.","Frite em óleo médio (não muito quente) por 8 min, mexendo, até dourar por igual.","Escorra em papel-toalha, salgue e deixe esfriar totalmente antes de guardar.","No pote fechado dura 2 semanas — coroa arroz, sopas, saladas e cachorro-quente."],"equipamentos":["panela","vidro com tampa"],"nutri":{"kcal":90,"prot":1,"carb":8,"gord":6}},
{"nome":"Pasta de pimentão assado (ajvar)","categoria":"Conserva","tags":["antepasto","balcânico","vegano"],"tempoMin":50,"porcoesBase":12,"ingredientes":[{"nome":"pimentao","qtd":4,"unidade":"un","critico":true},{"nome":"berinjela","qtd":1,"unidade":"un","critico":true},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"azeite","qtd":3,"unidade":"col sopa"},{"nome":"vinagre","qtd":1,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Asse pimentões e berinjela inteiros a 250°C por 35 min até a pele queimar.","Abafe 10 min, descasque tudo e descarte sementes.","Bata grosseiramente com alho, azeite, vinagre e sal — textura rústica.","Refogue a pasta 5 min para secar. Guarde na geladeira por 10 dias: espetacular no pão."],"equipamentos":["forno","vidro com tampa"],"nutri":{"kcal":70,"prot":1,"carb":6,"gord":5}},
{"nome":"Coxas assadas com laranja e alecrim","categoria":"Prato principal","tags":["assado","suculento"],"tempoMin":60,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":8,"unidade":"un","critico":true},{"nome":"laranja","qtd":2,"unidade":"un","critico":true},{"nome":"alecrim","qtd":2,"unidade":"ramo"},{"nome":"alho","qtd":4,"unidade":"dente"},{"nome":"azeite","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Tempere as coxas com sal, alho amassado, suco de 1 laranja e azeite; deixe 20 min.","Arrume na assadeira com rodelas da outra laranja e o alecrim por cima.","Asse a 200°C por 45 min, regando com o caldo na metade, até a pele dourar.","O molho do fundo é ouro: sirva por cima com arroz branco."],"equipamentos":["forno"],"nutri":{"kcal":380,"prot":34,"carb":8,"gord":23}},
{"nome":"Frango ao vinagre com cebolas","categoria":"Prato principal","tags":["panela","agridoce"],"tempoMin":45,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":800,"unidade":"g","critico":true},{"nome":"cebola","qtd":3,"unidade":"un","critico":true},{"nome":"vinagre","qtd":4,"unidade":"col sopa"},{"nome":"alho","qtd":3,"unidade":"dente"},{"nome":"louro","qtd":1,"unidade":"folha"},{"nome":"oleo","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Doure as sobrecoxas salgadas no óleo por 8 min; reserve.","Na mesma panela, refogue as cebolas em meias-luas por 5 min até dourar.","Volte o frango, junte vinagre, alho, louro e meia xícara de água.","Tampe e cozinhe em fogo baixo por 25 min — o vinagre vira um molho doce e profundo."],"equipamentos":["panela"],"nutri":{"kcal":360,"prot":32,"carb":8,"gord":22}},
{"nome":"Frango com creme de milho de forno","categoria":"Prato principal","tags":["cremoso","família"],"tempoMin":50,"porcoesBase":6,"ingredientes":[{"nome":"frango","qtd":600,"unidade":"g","critico":true},{"nome":"milho","qtd":2,"unidade":"lata","critico":true},{"nome":"leite","qtd":1,"unidade":"xíc"},{"nome":"queijo mussarela","qtd":150,"unidade":"g"},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"oleo","qtd":2,"unidade":"col sopa"}],"passos":["Refogue o frango desfiado (cozido) com cebola e alho por 5 min; tempere bem.","Bata 1,5 lata de milho com o leite no liquidificador; misture o restante inteiro.","Monte no refratário: frango embaixo, creme de milho por cima, mussarela cobrindo.","Forno a 200°C por 25 min até gratinar."],"equipamentos":["forno","liquidificador"],"nutri":{"kcal":390,"prot":31,"carb":26,"gord":18}},
{"nome":"Filé de frango recheado com queijo e presunto","categoria":"Prato principal","tags":["recheado","especial"],"tempoMin":40,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":4,"unidade":"un","critico":true},{"nome":"queijo mussarela","qtd":8,"unidade":"un","critico":true},{"nome":"presunto","qtd":8,"unidade":"un"},{"nome":"farinha de rosca","qtd":1,"unidade":"xíc"},{"nome":"ovo","qtd":2,"unidade":"un"},{"nome":"oleo","qtd":3,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Abra os filés ao meio como um livro e bata de leve para afinar; salgue.","Recheie cada um com 2 fatias de presunto e 2 de queijo; feche com palitos.","Passe no ovo batido e na farinha de rosca.","Doure na frigideira com óleo por 5 min de cada lado e termine no forno a 180°C por 10 min."],"equipamentos":["frigideira","forno"],"nutri":{"kcal":450,"prot":42,"carb":18,"gord":23}},
{"nome":"Nuggets caseiros de forno","categoria":"Prato principal","tags":["criança","assado"],"tempoMin":40,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":500,"unidade":"g","critico":true},{"nome":"farinha de rosca","qtd":1.5,"unidade":"xíc","critico":true},{"nome":"ovo","qtd":2,"unidade":"un"},{"nome":"parmesao","qtd":3,"unidade":"col sopa","opcional":true},{"nome":"paprica","qtd":1,"unidade":"col chá"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Bata o frango cru no processador com sal (ou pique bem miúdo) e modele bolinhos achatados.","Passe no ovo e na farinha de rosca misturada com parmesão e páprica.","Asse a 220°C por 20 min, virando na metade, até dourar (airfryer: 15 min).","Crocantes por fora, macios por dentro — sem fritura e sem mistério."],"equipamentos":["forno"],"nutri":{"kcal":320,"prot":32,"carb":24,"gord":10}},
{"nome":"Frango tandoori simplificado","categoria":"Prato principal","tags":["indiano","marinado"],"tempoMin":50,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":800,"unidade":"g","critico":true},{"nome":"iogurte","qtd":1,"unidade":"xíc","critico":true},{"nome":"paprica","qtd":1,"unidade":"col sopa"},{"nome":"curry","qtd":1,"unidade":"col sopa"},{"nome":"gengibre","qtd":1,"unidade":"col sopa"},{"nome":"alho","qtd":3,"unidade":"dente"},{"nome":"limao","qtd":1,"unidade":"un"},{"nome":"sal","qtd":1,"unidade":"col sopa"}],"passos":["Misture iogurte, páprica, curry, gengibre, alho, limão e sal.","Faça cortes nas sobrecoxas e envolva na marinada por no mínimo 30 min (ideal: overnight).","Asse a 230°C por 35 min até tostar nas pontas — o tostadinho é a alma do tandoori.","Sirva com arroz e rodelas de cebola cruas com limão."],"equipamentos":["forno"],"nutri":{"kcal":370,"prot":36,"carb":7,"gord":21}},
{"nome":"Frango agridoce com abacaxi","categoria":"Prato principal","tags":["agridoce","oriental"],"tempoMin":35,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":600,"unidade":"g","critico":true},{"nome":"abacaxi","qtd":2,"unidade":"xíc","critico":true},{"nome":"pimentao","qtd":1,"unidade":"un"},{"nome":"molho shoyu","qtd":3,"unidade":"col sopa"},{"nome":"acucar","qtd":1,"unidade":"col sopa"},{"nome":"vinagre","qtd":1,"unidade":"col sopa"},{"nome":"amido de milho","qtd":1,"unidade":"col sopa"},{"nome":"oleo","qtd":2,"unidade":"col sopa"}],"passos":["Salteie os cubos de frango no óleo bem quente por 6 min; reserve.","Salteie pimentão e abacaxi em cubos por 3 min.","Molho: shoyu, açúcar, vinagre, amido e meia xícara de água; despeje na frigideira.","Volte o frango e cozinhe por 3 min até o molho encorpar e ficar brilhante."],"equipamentos":["frigideira"],"nutri":{"kcal":340,"prot":33,"carb":22,"gord":13}},
{"nome":"Frango com ervilha e cenoura de panela","categoria":"Prato principal","tags":["panela","família"],"tempoMin":40,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":700,"unidade":"g","critico":true},{"nome":"ervilha","qtd":1,"unidade":"xíc","critico":true},{"nome":"cenoura","qtd":2,"unidade":"un"},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"molho de tomate","qtd":0.5,"unidade":"xíc"},{"nome":"oleo","qtd":2,"unidade":"col sopa"}],"passos":["Doure os pedaços de frango salgados no óleo por 8 min.","Junte cebola e alho e refogue por 2 min.","Acrescente cenoura em rodelas, molho de tomate e 1 xícara de água; tampe por 20 min.","Junte a ervilha nos últimos 5 min. Comida de vó com arroz branco."],"equipamentos":["panela"],"nutri":{"kcal":350,"prot":34,"carb":14,"gord":18}},
{"nome":"Frango ao vinho de panela","categoria":"Prato principal","tags":["especial","francês"],"tempoMin":60,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":800,"unidade":"g","critico":true},{"nome":"vinho tinto","qtd":1,"unidade":"xíc","critico":true},{"nome":"bacon","qtd":100,"unidade":"g"},{"nome":"champignon","qtd":200,"unidade":"g"},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"louro","qtd":1,"unidade":"folha"},{"nome":"farinha de trigo","qtd":1,"unidade":"col sopa"}],"passos":["Frite o bacon; na gordura, doure as sobrecoxas salgadas por 8 min.","Refogue cebola, alho e champignon por 4 min; polvilhe a farinha e mexa 1 min.","Junte o vinho, o louro e meia xícara de água, raspando o fundo.","Tampe e cozinhe em fogo baixo por 35 min. É o coq au vin sem cerimônia."],"equipamentos":["panela"],"nutri":{"kcal":430,"prot":36,"carb":9,"gord":26}},
{"nome":"Sobrecoxas com batatas na airfryer","categoria":"Prato principal","tags":["airfryer","prático"],"tempoMin":40,"porcoesBase":2,"ingredientes":[{"nome":"frango","qtd":4,"unidade":"un","critico":true},{"nome":"batata","qtd":3,"unidade":"un","critico":true},{"nome":"paprica","qtd":1,"unidade":"col sopa"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"azeite","qtd":2,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Tempere as sobrecoxas com sal, alho e páprica; as batatas em gomos com azeite e sal.","Airfryer a 180°C: batatas por baixo, frango com a pele para cima.","Asse por 25 min, depois suba para 200°C por mais 8 min para pururucar a pele.","Jantar completo numa cesta só."],"equipamentos":["airfryer"],"nutri":{"kcal":480,"prot":36,"carb":32,"gord":24}},
{"nome":"Frango cremoso com abóbora","categoria":"Prato principal","tags":["cremoso","conforto"],"tempoMin":45,"porcoesBase":4,"ingredientes":[{"nome":"frango","qtd":600,"unidade":"g","critico":true},{"nome":"abobora","qtd":500,"unidade":"g","critico":true},{"nome":"requeijao","qtd":3,"unidade":"col sopa"},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"oleo","qtd":2,"unidade":"col sopa"}],"passos":["Cozinhe a abóbora em cubos por 15 min e amasse grosseiramente com o caldo.","Refogue o frango desfiado com cebola e alho por 5 min.","Junte o purê rústico de abóbora e o requeijão; acerte sal e pimenta.","Cozinhe por 5 min mexendo — cremoso estilo frango na moranga, sem a moranga."],"equipamentos":["panela"],"nutri":{"kcal":340,"prot":32,"carb":16,"gord":16}},
{"nome":"Escondidinho de frango","categoria":"Prato principal","tags":["família","forno"],"tempoMin":60,"porcoesBase":6,"ingredientes":[{"nome":"frango","qtd":600,"unidade":"g","critico":true},{"nome":"mandioca","qtd":800,"unidade":"g","critico":true},{"nome":"requeijao","qtd":3,"unidade":"col sopa"},{"nome":"queijo mussarela","qtd":150,"unidade":"g"},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"molho de tomate","qtd":0.5,"unidade":"xíc"},{"nome":"manteiga","qtd":2,"unidade":"col sopa"}],"passos":["Cozinhe a mandioca por 25 min até desmanchar; amasse com manteiga e um pouco do caldo.","Refogue o frango desfiado com cebola e molho de tomate por 8 min.","Monte: frango, requeijão em pontos, purê por cima, mussarela cobrindo.","Forno a 200°C por 20 min até gratinar."],"equipamentos":["panela","forno"],"nutri":{"kcal":480,"prot":34,"carb":42,"gord":19}},
{"nome":"Torta de frango de liquidificador","categoria":"Prato principal","tags":["prática","lanche"],"tempoMin":60,"porcoesBase":8,"ingredientes":[{"nome":"frango","qtd":500,"unidade":"g","critico":true},{"nome":"farinha de trigo","qtd":2,"unidade":"xíc","critico":true},{"nome":"leite","qtd":1.5,"unidade":"xíc"},{"nome":"ovo","qtd":3,"unidade":"un"},{"nome":"oleo","qtd":0.5,"unidade":"xíc"},{"nome":"fermento","qtd":1,"unidade":"col sopa"},{"nome":"milho","qtd":0.5,"unidade":"lata","opcional":true},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Bata leite, ovos, óleo, farinha, sal e por último o fermento no liquidificador.","Recheio: frango desfiado refogado e temperado, com milho.","Metade da massa na forma untada, recheio, resto da massa por cima.","Forno a 180°C por 40 min até dourar e o palito sair seco."],"equipamentos":["liquidificador","forno"],"nutri":{"kcal":410,"prot":24,"carb":34,"gord":19}},
{"nome":"Risoto rápido de frango","categoria":"Prato principal","tags":["cremoso","uma panela"],"tempoMin":35,"porcoesBase":4,"ingredientes":[{"nome":"arroz","qtd":1.5,"unidade":"xíc","critico":true},{"nome":"frango","qtd":400,"unidade":"g","critico":true},{"nome":"cebola","qtd":1,"unidade":"un"},{"nome":"alho","qtd":2,"unidade":"dente"},{"nome":"manteiga","qtd":2,"unidade":"col sopa"},{"nome":"parmesao","qtd":4,"unidade":"col sopa"},{"nome":"sal","qtd":1,"unidade":"col chá"}],"passos":["Salteie o frango em cubos na metade da manteiga por 5 min; reserve.","Refogue cebola e alho, junte o arroz e frite por 1 min.","Adicione água quente aos poucos (cerca de 4 xícaras), mexendo, por 18 min.","Finalize com frango, o resto da manteiga e o parmesão — cremoso sem vinho e sem drama."],"equipamentos":["panela"],"nutri":{"kcal":450,"prot":30,"carb":52,"gord":14}},
